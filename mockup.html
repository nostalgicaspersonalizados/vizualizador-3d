<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nostálgicas Studio PRO</title>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>

<style>
body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: sans-serif;
    background: #111;
    color: white;
}

#render-3d { flex: 1; }

#sidebar {
    width: 360px;
    background: #1c1c1c;
    padding: 20px;
    display: flex;
    flex-direction: column;
    border-left: 1px solid #333;
}

canvas { background: white; }

.btn {
    padding: 10px;
    margin-top: 8px;
    border: none;
    background: #333;
    color: white;
    cursor: pointer;
}

.btn:hover { background: #555; }

.btn-main {
    background: #00a86b;
}

input { width: 100%; margin-top: 5px; }
</style>
</head>

<body>

<div id="render-3d"></div>

<div id="sidebar">

<h3>Nostálgicas Studio PRO</h3>

<canvas id="canvas2d" width="320" height="150"></canvas>

<input type="file" id="imgUpload">
<button class="btn" onclick="addText()">Adicionar Texto</button>

<hr>

<label>Fundo do Mockup</label>
<input type="file" id="bgUpload">

<hr>

<label>Rotação</label>
<input type="range" id="rot" min="-1" max="1" step="0.01">

<label>Zoom</label>
<input type="range" id="zoom" min="3" max="10" step="0.1" value="6">

<hr>

<button class="btn btn-main" onclick="exportPNG()">Exportar PNG</button>
<button class="btn" onclick="exportTransparent()">PNG Transparente</button>

</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

//// FABRIC
const fCanvas = new fabric.Canvas('canvas2d', {
    backgroundColor: '#fff'
});

window.addText = () => {
    fCanvas.add(new fabric.IText('Texto', { left: 50, top: 50 }));
};

document.getElementById('imgUpload').onchange = e => {
    const r = new FileReader();
    r.onload = f => {
        fabric.Image.fromURL(f.target.result, img => {
            img.scaleToWidth(120);
            fCanvas.add(img);
        });
    };
    r.readAsDataURL(e.target.files[0]);
};

//// THREE
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    45,
    (window.innerWidth - 360) / window.innerHeight,
    0.1,
    1000
);

camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth - 360, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

document.getElementById('render-3d').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

//// LUZ
scene.add(new THREE.AmbientLight(0xffffff, 1.3));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

//// TEXTURA
const texture = new THREE.CanvasTexture(fCanvas.getElement());
texture.colorSpace = THREE.SRGBColorSpace;
texture.anisotropy = renderer.capabilities.getMaxAnisotropy();

fCanvas.on('after:render', () => texture.needsUpdate = true);

//// CANECA
const mug = new THREE.Mesh(
    new THREE.CylinderGeometry(1, 1, 2.2, 64, 1, true),
    new THREE.MeshStandardMaterial({ map: texture, roughness: 0.3 })
);

scene.add(mug);

//// ALÇA
const handle = new THREE.Mesh(
    new THREE.TorusGeometry(0.6, 0.1, 16, 32, Math.PI),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
);

handle.position.set(1, 0, 0);
handle.rotation.z = -Math.PI / 2;

mug.add(handle);

//// SOMBRA REAL
const shadowGeo = new THREE.PlaneGeometry(4, 4);
const shadowMat = new THREE.MeshBasicMaterial({
    color: 0x000000,
    transparent: true,
    opacity: 0.15
});

const shadow = new THREE.Mesh(shadowGeo, shadowMat);
shadow.rotation.x = -Math.PI / 2;
shadow.position.y = -1.2;

scene.add(shadow);

//// FUNDO
let bgTexture = null;

document.getElementById('bgUpload').onchange = e => {
    const r = new FileReader();
    r.onload = f => {
        new THREE.TextureLoader().load(f.target.result, tex => {
            scene.background = tex;
        });
    };
    r.readAsDataURL(e.target.files[0]);
};

//// CONTROLES
document.getElementById('rot').oninput = e => {
    mug.rotation.y = parseFloat(e.target.value) * Math.PI;
};

document.getElementById('zoom').oninput = e => {
    camera.position.z = parseFloat(e.target.value);
    camera.updateProjectionMatrix();
};

//// EXPORTAÇÃO
window.exportPNG = () => {
    const link = document.createElement('a');
    link.download = 'mockup.png';
    link.href = renderer.domElement.toDataURL();
    link.click();
};

window.exportTransparent = () => {
    const oldBg = scene.background;
    scene.background = null;

    renderer.render(scene, camera);

    const link = document.createElement('a');
    link.download = 'mockup-transparent.png';
    link.href = renderer.domElement.toDataURL();
    link.click();

    scene.background = oldBg;
};

//// RESIZE
window.addEventListener('resize', () => {
    const w = window.innerWidth - 360;
    const h = window.innerHeight;

    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

//// LOOP
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
