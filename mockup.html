<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio - Sistema Profissional</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #f0f2f5; overflow: hidden; }
        #render-3d { flex: 1; background: #fff; position: relative; }
        #sidebar { width: 360px; background: #fff; border-left: 1px solid #ddd; padding: 25px; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.05); z-index: 10; }
        .editor-2d { border: 2px solid #3376e3; border-radius: 4px; background: #fff; margin: 15px 0; }
        .btn-principal { background: #3376e3; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .btn-concluir { background: #f8f9fa; color: #333; border: 1px solid #ccc; margin-top: 10px; padding: 12px; width: 100%; cursor: pointer; border-radius: 5px; font-weight: 600; }
        label { font-size: 11px; font-weight: bold; display: block; margin-top: 10px; color: #555; }
        input[type="range"] { width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div id="render-3d"></div>

<aside id="sidebar">
    <h2 style="margin:0; font-size: 1.2rem;">Editor Nostálgicas</h2>
    
    <input type="file" id="upload-foto" style="display:none" accept="image/*">
    <button class="btn-principal" onclick="document.getElementById('upload-foto').click()">📂 Carregar Imagem</button>

    <div class="editor-2d">
        <canvas id="canvas2d" width="310" height="135"></canvas>
    </div>

    <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
        <label>Girar Arte (Horizontal)</label>
        <input type="range" id="rotacao" min="0" max="6.28" step="0.01" value="3.14">
        
        <label>Altura (Vertical)</label>
        <input type="range" id="altura" min="-2" max="2" step="0.01" value="0">
        
        <label>Zoom da Estampa</label>
        <input type="range" id="zoom" min="0.1" max="2" step="0.01" value="1">
    </div>

    <button class="btn-concluir" onclick="finalizarEdicao()">✔️ CONCLUIR (Limpar Ajustes)</button>
</aside>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, caneca, estampa, fCanvas;

    // --- 1. EDITOR 2D (FABRIC.JS) ---
    fCanvas = new fabric.Canvas('canvas2d', { backgroundColor: '#ffffff' });
    
    // Função Vital: Remove os pontos azuis
    window.finalizarEdicao = () => {
        fCanvas.discardActiveObject(); // Desmarca a imagem no editor 2D
        fCanvas.requestRenderAll();    // Atualiza o canvas
    };

    // Atualiza a textura no 3D
    fCanvas.on('after:render', () => {
        if (!estampa) return;
        const texture = new THREE.CanvasTexture(fCanvas.getElement());
        texture.colorSpace = THREE.SRGBColorSpace;
        estampa.material.map = texture;
        estampa.material.needsUpdate = true;
    });

    // --- 2. CONFIGURAÇÃO DO AMBIENTE 3D ---
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 360) / window.innerHeight, 0.01, 100);
    camera.position.set(0, 0, 1); // Câmera posicionada perto para canecas pequenas

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth - 360, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('render-3d').appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 1.8));
    
    const luzFoco = new THREE.DirectionalLight(0xffffff, 1);
    luzFoco.position.set(5, 5, 5);
    scene.add(luzFoco);

    // --- 3. CARREGAR O ARQUIVO MUG.OBJ ---
    const loader = new OBJLoader();
    loader.load('mug.obj', (objeto) => {
        caneca = objeto;

        // Centralização rigorosa
        const box = new THREE.Box3().setFromObject(caneca);
        const center = box.getCenter(new THREE.Vector3());
        caneca.position.sub(center); // Move o centro da caneca para o ponto (0,0,0)

        caneca.traverse(child => {
            if (child.isMesh) {
                child.material = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1, clearcoat: 1 });
            }
        });
        scene.add(caneca);

        // Criar Estampa (Protegendo a alça - Comprimento 4.0 radianos)
        const size = box.getSize(new THREE.Vector3());
        const raio = (size.x / 2) * 1.015; // Um tiquinho maior que a caneca
        const altura = size.y * 0.85;
        // O valor 4.0 no final cria o corte para a alça. Se a arte ainda aparecer na alça, diminua para 3.5.
        const geo = new THREE.CylinderGeometry(raio, raio, altura,30, 1, true, -2.0, 4.0);
        
        estampa = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ 
            transparent: true, 
            side: THREE.DoubleSide,
            polygonOffset: true, 
            polygonOffsetFactor: -1
        }));
        
        estampa.rotation.y = -20.0; // Ajusta para a frente da caneca
        scene.add(estampa);

        // Define a câmera para focar no tamanho da caneca
        camera.position.z = size.z * 3;
        controls.update();
    });

    // --- 4. UPLOAD DE IMAGEM ---
    document.getElementById('upload-foto').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            fabric.Image.fromURL(event.target.result, (img) => {
                img.scaleToHeight(130);
                fCanvas.add(img);
                fCanvas.centerObject(img);
                fCanvas.setActiveObject(img);
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // --- 5. LIGAÇÃO DOS SLIDERS (CONTROLES MANUAIS) ---
    document.getElementById('rotacao').addEventListener('input', (e) => {
        if (estampa) estampa.rotation.y = parseFloat(e.target.value);
    });

    document.getElementById('altura').addEventListener('input', (e) => {
        if (estampa) estampa.position.y = parseFloat(e.target.value);
    });

    document.getElementById('zoom').addEventListener('input', (e) => {
        if (estampa) {
            const s = parseFloat(e.target.value);
            estampa.scale.set(s, s, s);
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = (window.innerWidth - 360) / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth - 360, window.innerHeight);
    };
</script>
</body>
</html>
