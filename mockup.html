<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Studio - Preview 3D</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #1a1a1a; --accent: #2ecc71; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow: hidden; }
        #render-3d { flex: 1; background: #ffffff; }
        #sidebar { width: 380px; background: #222; padding: 20px; border-left: 1px solid #444; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.3); }
        .canvas-area { background: #333; padding: 5px; border: 1px solid #555; margin-bottom: 20px; position: relative; }
        .dim-label { position: absolute; top: -18px; left: 0; font-size: 10px; color: var(--accent); font-weight: bold; }
        .btn { background: transparent; color: white; border: 1.5px solid white; padding: 12px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; width: 100%; margin-bottom: 10px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { background: white; color: black; }
        .btn-save { background: var(--accent); border: none; padding: 15px; margin-top: 10px; }
        .btn-save:hover { background: #27ae60; }
        label { font-size: 10px; color: #aaa; margin-bottom: 8px; display: block; text-transform: uppercase; }
        input[type="range"] { width: 100%; margin-bottom: 20px; accent-color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<div id="render-3d"></div>

<aside id="sidebar">
    <h2 style="color: var(--accent); margin: 0 0 20px 0; font-size: 18px;">NOSTÁLGICAS STUDIO</h2>
    
    <div class="canvas-area">
        <span class="dim-label">ÁREA DE IMPRESSÃO: 22,5 x 9,5 cm</span>
        <canvas id="canvas2d" width="450" height="190"></canvas>
    </div>

    <input type="file" id="up-img" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('up-img').click()"><i class="fa-regular fa-image"></i> INSERIR FOTO/ARTE</button>
    <button class="btn" onclick="addText()"><i class="fa-solid fa-font"></i> ADICIONAR TEXTO</button>
    
    <button class="btn btn-save" onclick="takePhoto()"><i class="fa-solid fa-camera"></i> SALVAR FOTO PARA CLIENTE</button>

    <div style="margin-top: 20px; border-top: 1px solid #444; padding-top: 20px;">
        <label>Girar Arte (Horizontal)</label>
        <input type="range" id="rot" min="-0.5" max="0.5" step="0.001" value="0">
        
        <label>Aproximar/Afastar</label>
        <input type="range" id="zoom" min="3" max="8" step="0.1" value="5.5">
    </div>
</aside>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. CONFIGURAÇÃO DO EDITOR 2D (FABRIC.JS)
    const fCanvas = new fabric.Canvas('canvas2d', { backgroundColor: '#fff' });
    
    // Sincroniza o editor com o 3D em tempo real
    fCanvas.on('after:render', () => { if(texture3d) texture3d.needsUpdate = true; });

    // 2. AMBIENTE 3D (THREE.JS)
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const container = document.getElementById('render-3d');
    const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, 5.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Iluminação Profissional
    scene.add(new THREE.AmbientLight(0xffffff, 1.4));
    const light = new THREE.DirectionalLight(0xffffff, 0.8);
    light.position.set(5, 5, 5);
    scene.add(light);

    // 3. TEXTURA E CARREGAMENTO
    const texture3d = new THREE.CanvasTexture(fCanvas.getElement());
    texture3d.colorSpace = THREE.SRGBColorSpace;
    texture3d.wrapS = THREE.RepeatWrapping;

    const loader = new GLTFLoader();
    // Verifique se o nome do arquivo no GitHub é exatamente canecaaa.glb
    loader.load('canecaaa.glb', (gltf) => {
        const model = gltf.scene;
        
        model.traverse((child) => {
            if (child.isMesh) {
                // Aplicamos o material que aceita a estampa
                child.material = new THREE.MeshPhongMaterial({
                    map: texture3d,
                    color: 0xffffff,
                    shininess: 90,
                    side: THREE.FrontSide // Garante que a arte NÃO apareça por dentro
                });
            }
        });

        // Centralização Automática
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);
        
        scene.add(model);
        console.log("Caneca carregada com sucesso!");
    }, undefined, (err) => {
        console.error("Erro ao carregar o arquivo:", err);
        alert("Erro ao carregar 'canecaaa.glb'. Verifique o nome do arquivo no GitHub!");
    });

    // 4. FUNÇÕES DA INTERFACE
    window.addText = () => {
        const text = new fabric.IText('Nostálgicas', {
            left: 150, top: 80, fontSize: 35, fontFamily: 'Arial
