<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas - Studio Pro (OBJ)</title>
    
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    
    <style>
        :root { --rosa: #ff4081; --blue: #3376e3; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #f4f7fa; overflow: hidden; }
        #viewport { flex: 1; position: relative; background: radial-gradient(circle, #ffffff 0%, #d1d9e0 100%); }
        #sidebar { width: 380px; background: white; border-left: 1px solid #d1d9e0; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; box-shadow: -5px 0 15px rgba(0,0,0,0.05); }
        h3 { margin: 0 0 15px 0; color: #333; font-size: 16px; text-transform: uppercase; border-bottom: 2px solid var(--rosa); padding-bottom: 10px; }
        .editor-box { width: 100%; border: 1px solid #ddd; background: #fff; border-radius: 4px; margin-bottom: 15px; }
        .btn-main { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
        .instruction { font-size: 11px; color: #666; line-height: 1.5; margin-top: 10px; }
    </style>
</head>
<body>

<div id="viewport"></div>

<div id="sidebar">
    <h3>Opções de Arte</h3>
    <input type="file" id="up-image" style="display:none" accept="image/*">
    <button class="btn-main" onclick="document.getElementById('up-image').click()">📂 Carregar Imagem</button>

    <p style="font-size: 10px; color: #999; margin: 15px 0 5px;">Área de Trabalho (22.5 x 9.5cm):</p>
    <div class="editor-box">
        <canvas id="c2d" width="340" height="143"></canvas>
    </div>

    <div class="instruction">
        • Use os <b>quadrados laterais</b> para esticar a arte.<br>
        • Use os <b>quadrados dos cantos</b> para escala total.<br>
        • A caneca 3D atualiza automaticamente.
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, mug, decal, fCanvas;

    // 1. Configuração do Editor 2D (Fabric.js) para esticar arte
    function initFabric() {
        fCanvas = new fabric.Canvas('c2d', { backgroundColor: '#ffffff' });
        fabric.Object.prototype.set({
            transparentCorners: false,
            cornerColor: '#3376e3',
            cornerSize: 10,
            cornerStyle: 'rect'
        });
        fCanvas.on('after:render', updateMugTexture);
    }

    // 2. Configuração do 3D para mug.obj
    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(30, (window.innerWidth - 380) / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth - 380, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('viewport').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(5, 5, 5);
        scene.add(sun);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // CARREGANDO O NOVO ARQUIVO MUG.OBJ
        new OBJLoader().load('mug.obj', (obj) => {
            mug = obj;
            const box = new THREE.Box3().setFromObject(mug);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            mug.position.sub(center); // Centraliza o modelo

            // Ajusta a câmera para o tamanho do mug.obj
            camera.position.set(0, 0, size.z * 3.8);

            mug.traverse(child => {
                if (child.isMesh) {
                    child.material = new THREE.MeshPhysicalMaterial({
                        color: 0xffffff, roughness: 0.1, metalness: 0, clearcoat: 1
                    });
                }
            });
            scene.add(mug);

            // Camada de Estampa (Cilindro de Envelopamento)
            const geo = new THREE.CylinderGeometry(size.x/1.96, size.x/1.96, size.y*0.88, 64, 1, true, -Math.PI/1.5, Math.PI*1.33);
            decal = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ 
                transparent: true, side: THREE.DoubleSide, polygonOffset: true, polygonOffsetFactor: -1 
            }));
            decal.rotation.y = Math.PI / 2;
            scene.add(decal);
        });

        animate();
    }

    function updateMugTexture() {
        if (!decal) return;
        const dataURL = fCanvas.toDataURL({ format: 'png', quality: 1 });
        new THREE.TextureLoader().load(dataURL, (tex) => {
            decal.material.map = tex;
            decal.material.needsUpdate = true;
        });
    }

    document.getElementById('up-image').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                img.scaleToHeight(140);
                img.set({ left: 10, top: 0 });
                fCanvas.add(img);
                fCanvas.setActiveObject(img);
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function animate() {
        requestAnimationFrame(animate);
        if(controls) controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        const w = window.innerWidth - 380;
        camera.aspect = w / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(w, window.innerHeight);
    });

    initFabric();
    init3D();
</script>
</body>
</html>
