<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nostálgicas - Mockup v3.0</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/interactjs/dist/interact.min.js"></script>
    <style>
        :root { --rosa: #ff4081; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Painel Lateral/Superior */
        #menu { width: 320px; background: white; border-right: 1px solid #ddd; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        
        /* O Retângulo de 22.5x9.5cm (Simulado) */
        .preview-container { 
            width: 100%; height: 120px; border: 2px dashed var(--rosa); background: #f9f9f9; 
            position: relative; overflow: hidden; cursor: move; touch-action: none;
        }
        #img-edit { position: absolute; transform-origin: center; display: none; pointer-events: none; }

        #canvas-container { flex: 1; position: relative; background: radial-gradient(circle, #ffffff 0%, #e0e0e0 100%); }
        
        .btn { background: var(--rosa); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        label { font-size: 11px; font-weight: bold; color: #555; }

        /* Ajuste para Celular */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #menu { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #ddd; padding: 10px; }
            .preview-container { height: 80px; }
        }
    </style>
</head>
<body>

<div id="menu">
    <h3 style="margin:0; color:var(--rosa); font-size: 16px;">EDITOR DE ESTAMPA</h3>
    <input type="file" id="input-file" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('input-file').click()">CARREGAR FOTO</button>

    <label>AJUSTE VISUAL (Arraste e use o Scroll/Pinça):</label>
    <div class="preview-container" id="wrapper">
        <img id="img-edit" src="">
        <div id="placeholder" style="text-align:center; padding-top:30px; color:#ccc; font-size:10px;">ÁREA DE 22.5x9.5cm</div>
    </div>
    
    <button class="btn" style="background:#333; margin-top:10px;" onclick="window.location.reload()">LIMPAR</button>
</div>

<div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, mug, decal, texture;
    let imgPos = { x: 0, y: 0, scale: 0.5 };

    const imgEl = document.getElementById('img-edit');
    const wrapper = document.getElementById('wrapper');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        new GLTFLoader().load('caneca.glb', (gltf) => {
            mug = gltf.scene;
            const box = new THREE.Box3().setFromObject(mug);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            mug.position.sub(center);
            scene.add(mug);

            // Câmera Focada na Caneca
            camera.position.set(0, 0, size.z * 3.5);
            controls.target.set(0, 0, 0);

            // CRIA A CAMADA DE ESTAMPA (Invisível até carregar foto)
            const geo = new THREE.CylinderGeometry(size.x/1.95, size.x/1.95, size.y*0.9, 64, 1, true, -Math.PI/1.5, Math.PI*1.33);
            decal = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ transparent: true, side: THREE.DoubleSide, polygonOffset: true, polygonOffsetFactor: -4 }));
            decal.rotation.y = Math.PI / 2;
            scene.add(decal);
            
            onWindowResize();
        });

        animate();
    }

    function update() {
        imgEl.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        imgEl.style.transform = `translate(${imgPos.x}px, ${imgPos.y}px) scale(${imgPos.scale})`;

        if (texture) {
            const s = 1 / imgPos.scale;
            texture.repeat.set(s, s);
            texture.offset.set(0.5 - (imgPos.x / 200) - (0.5/s), 0.5 - (imgPos.y / 100) - (0.5/s));
        }
    }

    // Controle de Arrastar e Zoom
    interact('.preview-container').draggable({
        onmove: (e) => { imgPos.x += e.dx; imgPos.y += e.dy; update(); }
    }).on('mousewheel', (e) => {
        imgPos.scale = Math.max(0.1, imgPos.scale - e.deltaY / 500);
        update();
        e.preventDefault();
    });

    document.getElementById('input-file').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            new THREE.TextureLoader().load(ev.target.result, (tex) => {
                texture = tex;
                texture.wrapS = texture.wrapT = THREE.ClampToEdgeWrapping;
                decal.material.map = texture;
                decal.material.needsUpdate = true;
                imgEl.src = ev.target.result;
                update();
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function onWindowResize() {
        const w = document.getElementById('canvas-container').clientWidth;
        const h = document.getElementById('canvas-container').clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    }

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    window.addEventListener('resize', onWindowResize);
    init();
</script>
</body>
</html>
