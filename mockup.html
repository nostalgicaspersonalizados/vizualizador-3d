<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Studio - Restaurado</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #222; --accent: #ffffff; --panel: #333; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        #render-3d { flex: 1; background: #ffffff; }
        #sidebar { width: 380px; background: var(--panel); padding: 20px; border-left: 1px solid #444; display: flex; flex-direction: column; }
        .dim-text { font-size: 13px; margin-bottom: 10px; color: #ccc; }
        .canvas-area { background: #444; padding: 5px; border: 1px solid #555; margin-bottom: 20px; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: transparent; color: white; border: 2px solid white; padding: 12px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; }
        .btn:hover { background: rgba(255,255,255,0.1); }
        .btn-full { grid-column: span 2; }
        .controls { margin-top: 20px; border-top: 1px solid #555; padding-top: 20px; }
        label { font-size: 11px; text-transform: uppercase; color: #888; display: block; margin-bottom: 5px; }
        input[type="range"] { width: 100%; margin-bottom: 15px; accent-color: white; }
    </style>
</head>
<body>

<div id="render-3d"></div>

<aside id="sidebar">
    <div class="dim-text">Dimensões do layout (mm): 210 x 95</div>
    <div class="canvas-area">
        <canvas id="canvas2d" width="340" height="155"></canvas>
    </div>

    <div class="button-grid">
        <input type="file" id="up-img" style="display:none" accept="image/*">
        <button class="btn" onclick="document.getElementById('up-img').click()"><i class="fa-regular fa-image"></i> Imagem</button>
        <button class="btn" onclick="addText()"><i class="fa-solid fa-font"></i> Texto</button>
        <button class="btn" onclick="takePhoto()"><i class="fa-solid fa-camera"></i> Foto 3D</button>
        <button class="btn" onclick="downloadLayout()"><i class="fa-solid fa-download"></i> Layout</button>
        <button class="btn btn-full"><i class="fa-solid fa-video"></i> Renderização de Vídeo</button>
    </div>

    <div class="controls">
        <label>Girar Arte na Frente</label>
        <input type="range" id="rot" min="-0.5" max="0.5" step="0.001" value="0">
        <label>Zoom da Caneca</label>
        <input type="range" id="cam-z" min="3" max="10" step="0.1" value="6">
    </div>
</aside>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. Setup Canvas 2D (Fabric)
    const fCanvas = new fabric.Canvas('canvas2d', { backgroundColor: '#fff' });
    fCanvas.on('after:render', () => { if(texture3d) texture3d.needsUpdate = true; });

    // 2. Setup Three.js
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 380) / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth - 380, window.innerHeight);
    document.getElementById('render-3d').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 2.0));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5,5,5);
    scene.add(light);

    // 3. Textura e Shader (Correção de visibilidade)
    const texture3d = new THREE.CanvasTexture(fCanvas.getElement());
    texture3d.colorSpace = THREE.SRGBColorSpace;

    const mat = new THREE.ShaderMaterial({
        uniforms: { map: { value: texture3d }, color: { value: new THREE.Color(0xffffff) } },
        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
        fragmentShader: `
            uniform sampler2D map; uniform vec3 color; varying vec2 vUv;
            void main() {
                vec4 tex = texture2D(map, vUv);
                if (gl_FrontFacing) { gl_FragColor = mix(vec4(color,1.0), tex, tex.a); }
                else { gl_FragColor = vec4(color, 1.0); }
            }
        `,
        side: THREE.DoubleSide
    });

    // 4. Carregar Caneca (Com verificação de erro)
    const loader = new OBJLoader();
    loader.load('mug.obj', (obj) => {
        const mesh = obj.children[0];
        obj.scale.set(50, 50, 50);
        
        // Centralizar
        const box = new THREE.Box3().setFromObject(obj);
        const center = box.getCenter(new THREE.Vector3());
        obj.position.sub(center);

        // Mapeamento UV Estável
        const geo = mesh.geometry;
        geo.computeBoundingBox();
        const uv = geo.attributes.uv;
        const pos = geo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            let u = Math.atan2(pos.getX(i), pos.getZ(i)) / (Math.PI * 2) + 0.5;
            let v = (pos.getY(i) - geo.boundingBox.min.y) / (geo.boundingBox.max.y - geo.boundingBox.min.y);
            uv.setXY(i, (u + 0.5) % 1.0, v);
        }

        mesh.material = mat;
        scene.add(obj);
        console.log("Caneca carregada com sucesso!");
    }, 
    (xhr) => console.log((xhr.loaded / xhr.total * 100) + '% carregado'),
    (err) => alert("ERRO: O arquivo 'mug.obj' não foi encontrado na pasta!"));

    // Funções de Interface
    window.addText = () => { fCanvas.add(new fabric.IText('Texto', {left: 50, top: 50})); };
    document.getElementById('up-img').onchange = (e) => {
        const r = new FileReader();
        r.onload = (f) => fabric.Image.fromURL(f.target.result, (img) => {
            img.scaleToWidth(100); fCanvas.add(img).centerObject(img);
        });
        r.readAsDataURL(e.target.files[0]);
    };
    window.takePhoto = () => { const a = document.createElement('a'); a.download = 'foto.png'; a.href = renderer.domElement.toDataURL(); a.click(); };
    window.downloadLayout = () => { const a = document.createElement('a'); a.download = 'layout.png'; a.href = fCanvas.toDataURL(); a.click(); };
    
    document.getElementById('rot').oninput = (e) => texture3d.offset.x = parseFloat(e.target.value);
    document.getElementById('cam-z').oninput = (e) => camera.position.z = e.target.value;

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    animate();
</script>
</body>
</html>
