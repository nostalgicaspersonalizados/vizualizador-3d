<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio 3D - Final</title>
    <script src="https://ajax.googleapis.com/ajax/libs/threejs/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #000; overflow: hidden; }
        #canvas-3d { flex: 1; background: #ffffff; }
        #menu { width: 320px; background: #1a1a1a; padding: 20px; border-left: 3px solid #2ecc71; color: white; }
        .area-2d { background: #fff; margin-bottom: 15px; border: 1px solid #2ecc71; }
        .btn { width: 100%; padding: 12px; margin-bottom: 10px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px; background: #2ecc71; color: white; }
    </style>
</head>
<body>

<div id="canvas-3d"></div>

<aside id="menu">
    <h2 style="color:#2ecc71; margin:0 0 10px 0;">NOSTÁLGICAS</h2>
    <div class="area-2d">
        <canvas id="c2d" width="450" height="190" style="width:100%; height:auto;"></canvas>
    </div>
    <input type="file" id="foto" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('foto').click()">COLOCAR FOTO</button>
    <button class="btn" style="background:#444" onclick="baixar()">BAIXAR MOCKUP</button>
    <p style="font-size: 10px; color: #666; text-align: center;">Se a caneca não aparecer, tente abrir em aba anônima.</p>
</aside>

<script>
    // 1. Editor 2D
    const fCanvas = new fabric.Canvas('c2d', { backgroundColor: '#ffffff' });
    fCanvas.on('after:render', () => { if(tex) tex.needsUpdate = true; });

    // 2. Setup 3D com Verificação
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const container = document.getElementById('canvas-3d');
    
    const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // Luzes Fortes
    const light1 = new THREE.AmbientLight(0xffffff, 1);
    scene.add(light1);
    const light2 = new THREE.DirectionalLight(0xffffff, 0.8);
    light2.position.set(0, 5, 5);
    scene.add(light2);

    // 3. A Caneca
    const tex = new THREE.CanvasTexture(fCanvas.getElement());
    const mugGeo = new THREE.CylinderGeometry(1.2, 1.2, 2.5, 32);
    const mugMat = new THREE.MeshPhongMaterial({ map: tex, color: 0xffffff });
    const mug = new THREE.Mesh(mugGeo, mugMat);
    scene.add(mug);

    // Alça
    const handleGeo = new THREE.TorusGeometry(0.7, 0.12, 12, 48, Math.PI);
    const handle = new THREE.Mesh(handleGeo, new THREE.MeshPhongMaterial({color: 0xffffff}));
    handle.position.set(1.15, 0, 0);
    handle.rotation.z = -Math.PI/2;
    scene.add(handle);

    // 4. Ações
    document.getElementById('foto').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => fabric.Image.fromURL(f.target.result, (img) => {
            img.scaleToWidth(200); fCanvas.add(img).centerObject(img);
        });
        reader.readAsDataURL(e.target.files[0]);
    };

    function baixar() {
        const a = document.createElement('a');
        a.download = 'Nostalgicas_Mockup.png';
        a.href = renderer.domElement.toDataURL();
        a.click();
    }

    // Animação para teste visual
    function animate() {
        requestAnimationFrame(animate);
        mug.rotation.y += 0.01; // Caneca girando indica que o 3D está funcionando
        renderer.render(scene, camera);
    }
    animate();

    // Ajuste de tela
    window.onresize = () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    };
</script>
</body>
</html>
