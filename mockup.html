<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Studio - Preview 3D</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #000; overflow: hidden; }
        #render-3d { flex: 1; background: #ffffff; position: relative; }
        #sidebar { width: 320px; background: #111; padding: 20px; color: #fff; border-left: 1px solid #444; }
        .canvas-area { background: #fff; margin-bottom: 15px; border: 2px solid #2ecc71; }
        .btn { width: 100%; padding: 12px; margin-bottom: 8px; cursor: pointer; font-weight: bold; border: none; text-transform: uppercase; border-radius: 4px; }
        #status-msg { position: absolute; top: 10px; left: 10px; color: #000; font-weight: bold; background: #ffff00; padding: 5px; z-index: 999; }
    </style>
</head>
<body>

<div id="render-3d">
    <div id="status-msg">STATUS: CARREGANDO...</div>
</div>

<aside id="sidebar">
    <h3 style="color: #2ecc71;">NOSTÁLGICAS STUDIO</h3>
    <div class="canvas-area">
        <canvas id="canvas2d" width="450" height="190" style="width: 100%;"></canvas>
    </div>
    
    <input type="file" id="up-img" style="display:none" accept="image/*">
    <button class="btn" style="background:#444; color:#fff" onclick="document.getElementById('up-img').click()">Inserir Arte</button>
    <button class="btn" style="background:#2ecc71; color:#fff" onclick="takePhoto()">Salvar Foto</button>
    
    <div style="margin-top:20px; border-top: 1px solid #333; padding-top: 10px;">
        <label style="font-size:10px;">GIRAR ESTAMPA</label>
        <input type="range" id="rot" min="-0.5" max="0.5" step="0.001" value="0" style="width:100%">
    </div>
</aside>

<script>
    const status = document.getElementById('status-msg');

    // 1. Editor 2D
    const fCanvas = new fabric.Canvas('canvas2d', { backgroundColor: '#ffffff' });
    fCanvas.on('after:render', () => { if(texture3d) texture3d.needsUpdate = true; });

    // 2. Cena 3D Simples
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const container = document.getElementById('render-3d');
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 2));

    const texture3d = new THREE.CanvasTexture(fCanvas.getElement());

    // 3. Carregamento do Arquivo mug.glb
    const loader = new THREE.GLTFLoader();
    
    // Tentamos carregar o arquivo mug.glb
    loader.load('mug.glb', function(gltf) {
        status.innerText = "STATUS: CANECA OK!";
        status.style.background = "#00ff00";
        
        const model = gltf.scene;
        model.traverse((child) => {
            if (child.isMesh) {
                child.material = new THREE.MeshPhongMaterial({
                    map: texture3d,
                    color: 0xffffff,
                    side: THREE.FrontSide
                });
            }
        });
        
        // Garante que a caneca apareça no tamanho certo
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3()).length();
        const center = box.getCenter(new THREE.Vector3());
        
        model.position.x += (model.position.x - center.x);
        model.position.y += (model.position.y - center.y);
        model.position.z += (model.position.z - center.z);
        
        // Se a caneca for muito pequena, aumenta ela automaticamente
        if(size < 1) model.scale.set(10, 10, 10);
        
        scene.add(model);
    }, 
    undefined, 
    function(err) {
        console.error(err);
        status.innerText = "ERRO: O ARQUIVO 'mug.glb' NÃO FOI ENCONTRADO!";
        status.style.background = "#ff0000";
        status.style.color = "#fff";
    });

    // 4. Ações
    document.getElementById('up-img').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => fabric.Image.fromURL(f.target.result, (img) => {
            img.scaleToWidth(200); fCanvas.add(img).centerObject(img);
        });
        reader.readAsDataURL(e.target.files[0]);
    };

    window.takePhoto = () => {
        fCanvas.discardActiveObject(); fCanvas.renderAll();
        setTimeout(() => {
            const a = document.createElement('a');
            a.download = 'Preview_Caneca.png';
            a.href = renderer.domElement.toDataURL();
            a.click();
        }, 100);
    };

    document.getElementById('rot').oninput = (e) => texture3d.offset.x = parseFloat(e.target.value);

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    };
</script>
</body>
</html>
