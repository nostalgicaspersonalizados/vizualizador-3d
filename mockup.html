<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio - Fix Real</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #eee; overflow: hidden; }
        #render-area { flex: 1; background: #fff; position: relative; }
        #menu { width: 350px; background: #fff; border-left: 2px solid #3376e3; padding: 20px; z-index: 10; }
        .canvas-container { border: 1px solid #ccc; margin: 10px 0; background: #f9f9f9; }
        .btn { background: #3376e3; color: #fff; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; margin-bottom: 5px; }
        .btn-limpar { background: #666; font-size: 12px; }
    </style>
</head>
<body>

<div id="render-area"></div>

<aside id="menu">
    <h3 style="margin-top:0">Personalizar</h3>
    <input type="file" id="file-upload" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('file-upload').click()">CARREGAR IMAGEM</button>

    <div class="canvas-container">
        <canvas id="f-canvas" width="310" height="130"></canvas>
    </div>

    <button class="btn btn-limpar" onclick="concluir()">CONCLUIR (Remover Pontos Azuis)</button>
    <p style="font-size:11px; color:#555">Dica: Use as laterais para esticar a largura.</p>
</aside>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, mug, decal, fCanvas;

    // --- 1. EDITOR 2D ---
    fCanvas = new fabric.Canvas('f-canvas');
    fabric.Object.prototype.set({
        transparentCorners: false,
        cornerColor: '#3376e3',
        cornerSize: 8,
        lockUniScaling: false
    });

    window.concluir = () => {
        fCanvas.discardActiveObject();
        fCanvas.requestRenderAll();
    };

    fCanvas.on('after:render', () => {
        if (!decal) return;
        const tex = new THREE.CanvasTexture(fCanvas.getElement());
        tex.colorSpace = THREE.SRGBColorSpace;
        decal.material.map = tex;
        decal.material.needsUpdate = true;
    });

    // --- 2. SETUP 3D ---
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 350) / window.innerHeight, 0.001, 100);
    camera.position.set(0, 0.1, 0.4); // Câmera perto para canecas pequenas

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth - 350, window.innerHeight);
    document.getElementById('render-area').appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 2));

    // --- 3. CARREGAR MUG.OBJ ---
    const loader = new OBJLoader();
    loader.load('mug.obj', (obj) => {
        mug = obj;

        // Medir o tamanho real
        const box = new THREE.Box3().setFromObject(mug);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        // Centralizar a caneca no 0,0,0
        mug.position.set(-center.x, -center.y, -center.z);

        mug.traverse(c => {
            if (c.isMesh) c.material = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1 });
        });
        scene.add(mug);

        // Criar Estampa que NÃO pega na alça
        // Raio levemente maior (1.01) para evitar que a imagem "trema" (z-fighting)
        const geo = new THREE.CylinderGeometry(size.x/2 * 1.01, size.x/2 * 1.01, size.y * 0.85, 64, 1, true, -2.1, 4.2);
        decal = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ 
            transparent: true, 
            side: THREE.DoubleSide,
            polygonOffset: true, 
            polygonOffsetFactor: -1 
        }));
        
        decal.rotation.y = Math.PI; // Ajusta para a frente da caneca
        scene.add(decal);

        // Focar a câmera automaticamente no tamanho da caneca
        camera.position.z = size.z * 3;
        controls.update();
    });

    // --- 4. UPLOAD ---
    document.getElementById('file-upload').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                img.scaleToHeight(120);
                fCanvas.add(img);
                fCanvas.setActiveObject(img);
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = (window.innerWidth - 350) / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth - 350, window.innerHeight);
    };
</script>
</body>
</html>
