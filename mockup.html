<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas - Rapid Mockup System</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <style>
        :root { --primary: #ff4081; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #e0e0e0; overflow: hidden; }
        
        /* Painel Flutuante Estilo App */
        #ui-panel { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 24px; width: 90%; max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100;
        }

        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #444; margin-bottom: 5px; }
        
        input[type="range"] { width: 100%; height: 6px; border-radius: 3px; accent-color: var(--primary); outline: none; }
        
        .upload-btn {
            background: var(--primary); color: white; border: none; padding: 12px;
            width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 15px;
        }

        #canvas-container { width: 100vw; height: 100vh; background: radial-gradient(circle, #ffffff 0%, #dcdcdc 100%); }
    </style>
</head>
<body>

<div id="ui-panel">
    <input type="file" id="upload" accept="image/*" style="display:none">
    <button class="upload-btn" onclick="document.getElementById('upload').click()">CARREGAR ESTAMPA</button>
    
    <div class="control-group">
        <label>Ajuste de Zoom</label>
        <input type="range" id="scale" min="0.5" max="2" step="0.01" value="1">
    </div>

    <div class="control-group">
        <label>Posição Horizontal (Girar na Caneca)</label>
        <input type="range" id="offsetX" min="-3.14" max="3.14" step="0.01" value="0">
    </div>

    <div class="control-group">
        <label>Altura da Arte</label>
        <input type="range" id="offsetY" min="-0.5" max="0.5" step="0.01" value="0">
    </div>
</div>

<div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, mug, decalPlane, texture;

    init();

    function init() {
        scene = new THREE.Scene();

        // Câmera Focada
        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.5, 4);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Iluminação de Estúdio
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        // Carregar Caneca
        const loader = new GLTFLoader();
        loader.load('caneca.glb', (gltf) => {
            mug = gltf.scene;
            
            // Garantir material branco limpo na caneca
            mug.traverse(child => {
                if(child.isMesh) {
                    child.material = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, metalness: 0.1 });
                }
            });

            scene.add(mug);
            createDecalSystem();
            checkUrlParams();
        });

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 2.5;
        controls.maxDistance = 6;

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    // O PULO DO GATO: Criação da Geometria da Estampa
    function createDecalSystem() {
        // Criamos um cilindro que é um "pouquinho maior" que a caneca
        const geometry = new THREE.CylinderGeometry(1.02, 1.02, 2.2, 64, 1, true, 0, Math.PI); 
        const material = new THREE.MeshStandardMaterial({
            transparent: true,
            side: THREE.DoubleSide,
            polygonOffset: true, // Evita que a textura "pisque" na superfície
            polygonOffsetFactor: -4
        });

        decalPlane = new THREE.Mesh(geometry, material);
        // Rotaciona para ficar de frente
        decalPlane.rotation.y = -Math.PI / 2;
        scene.add(decalPlane);
    }

    function applyTexture(source) {
        new THREE.TextureLoader().load(source, (tex) => {
            texture = tex;
            texture.colorSpace = THREE.SRGBColorSpace;
            decalPlane.material.map = texture;
            decalPlane.material.needsUpdate = true;
            updateDecal();
        });
    }

    function updateDecal() {
        if (!decalPlane) return;
        
        const scale = parseFloat(document.getElementById('scale').value);
        const offX = parseFloat(document.getElementById('offsetX').value);
        const offY = parseFloat(document.getElementById('offsetY').value);

        decalPlane.scale.set(scale, 1, scale);
        decalPlane.rotation.y = offX - (Math.PI / 2);
        decalPlane.position.y = offY;
    }

    // Listeners
    document.getElementById('upload').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => applyTexture(ev.target.result);
        reader.readAsDataURL(e.target.files[0]);
    });

    ['scale', 'offsetX', 'offsetY'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateDecal);
    });

    function checkUrlParams() {
        const p = new URLSearchParams(window.location.search);
        if(p.get('foto')) {
            applyTexture(p.get('foto'));
            document.getElementById('ui-panel').style.display = 'none';
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
