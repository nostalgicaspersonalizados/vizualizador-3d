<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio - Correção Alça</title>
    <script type="importmap">

    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #f0f2f5; overflow: hidden; }
        #viewport { flex: 1; background: radial-gradient(circle, #ffffff 0%, #cbd5e0 100%); }
        #sidebar { width: 380px; background: #fff; border-left: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 10; }
        .editor-box { border: 2px solid #3376e3; background: #fff; border-radius: 8px; overflow: hidden; margin: 15px 0; }
        .btn { background: #3376e3; color: white; border: none; padding: 15px; cursor: pointer; font-weight: bold; border-radius: 6px; width: 100%; text-transform: uppercase; }
        .btn-limpar { background: #edf2f7; color: #4a5568; margin-top: 10px; border: 1px solid #cbd5e0; padding: 10px; cursor: pointer; border-radius: 6px; }
    </style>
</head>
<body>

<div id="viewport"></div>

<aside id="sidebar">
    <h2 style="font-size: 18px; color: #333; margin-top: 0;">Editor de Estampa</h2>
    <input type="file" id="up" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('up').click()">Selecionar Foto</button>

    <div class="editor-box">
        <canvas id="c" width="340" height="143"></canvas>
    </div>

    <button class="btn-limpar" onclick="finalizarEdicao()">Ver Sem Pontos Azuis</button>
    <p style="font-size: 11px; color: #666; margin-top: 15px;">
        * Use as alças laterais para esticar a largura.<br>
        * A arte não passará por cima da alça agora.
    </p>
</aside>

    // 1. Editor 2D
    fCanvas = new fabric.Canvas('c', { backgroundColor: '#ffffff' });
    fabric.Object.prototype.set({
        transparentCorners: false,
        cornerColor: '#3376e3',
        cornerSize: 10,
        lockUniScaling: false // Permite esticar só para os lados
    });

    // Remove pontos azuis
    window.finalizarEdicao = () => {
        fCanvas.discardActiveObject();
        fCanvas.requestRenderAll();
    };

    fCanvas.on('after:render', () => {
        if (!decal) return;
        const texture = new THREE.CanvasTexture(fCanvas.getElement());
        texture.anisotropy = 16;
        decal.material.map = texture;
        decal.material.needsUpdate = true;
    });

    renderer.setSize(window.innerWidth - 380, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('viewport').appendChild(renderer.domElement);
