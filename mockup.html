<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas - Sistema Anti-Erro</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #f0f2f5; overflow: hidden; }
        #canvas-container { flex: 1; background: #fff; position: relative; }
        #controls { width: 380px; background: #fff; border-left: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        .editor-box { border: 2px solid #3376e3; background: #fff; margin: 10px 0; }
        .btn { background: #3376e3; color: white; border: none; padding: 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .alert { font-size: 12px; color: #d9534f; background: #f9f2f2; padding: 10px; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<aside id="controls">
    <h2 style="font-size: 18px; color: #333;">Ajuste de Estampa</h2>
    <input type="file" id="fileInput" style="display:none">
    <button class="btn" onclick="document.getElementById('fileInput').click()">ESCOLHER IMAGEM</button>
    
    <div class="alert">
        <strong>Ajuste Manual:</strong> Use as alças laterais para ESTICAR a imagem até as bordas azuis.
    </div>

    <div class="editor-box">
        <canvas id="fabricCanvas" width="340" height="143"></canvas>
    </div>
</aside>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, mug, decal, fCanvas;

    // --- EDITOR 2D ---
    fCanvas = new fabric.Canvas('fabricCanvas');
    fabric.Object.prototype.set({
        transparentCorners: false,
        cornerColor: '#3376e3',
        cornerSize: 12,
        lockUniScaling: false // LIBERA O "ESTICAR" SEM PROPORÇÃO
    });

    fCanvas.on('after:render', () => {
        if (!decal) return;
        const texture = new THREE.CanvasTexture(fCanvas.getElement());
        decal.material.map = texture;
        decal.material.needsUpdate = true;
    });

    // --- MUNDO 3D ---
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    
    camera = new THREE.PerspectiveCamera(30, (window.innerWidth - 380) / window.innerHeight, 0.1, 1000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth - 380, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);

    controls = new OrbitControls(camera, renderer.domElement);

    const loader = new OBJLoader();
    loader.load('mug.obj', (obj) => {
        mug = obj;

        // REGRA DE OURO: Medir e centralizar à força
        const box = new THREE.Box3().setFromObject(mug);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        
        mug.position.x -= center.x;
        mug.position.y -= center.y;
        mug.position.z -= center.z;

        mug.traverse(child => {
            if (child.isMesh) {
                child.material = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1, clearcoat: 1 });
            }
        });
        scene.add(mug);

        // Cilindro de Estampa ajustado ao tamanho real medido
        const geo = new THREE.CylinderGeometry(size.x/1.98, size.x/1.98, size.y*0.88, 64, 1, true, -Math.PI/1.5, Math.PI*1.33);
        decal = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ transparent: true, side: THREE.DoubleSide, polygonOffset: true, polygonOffsetFactor: -1 }));
        decal.rotation.y = Math.PI / 2;
        scene.add(decal);

        camera.position.set(0, 0, size.z * 4);
    });

    document.getElementById('fileInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                img.scaleToHeight(143);
                fCanvas.add(img);
                fCanvas.setActiveObject(img);
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
