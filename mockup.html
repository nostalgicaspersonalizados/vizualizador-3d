<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Nostálgicas - Sistema de Precisão</title>
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    
    <style>
        :root { --primary: #3376e3; --bg: #f4f7fa; --rosa: #ff4081; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Layout Profissional */
        #main-container { flex: 1; display: flex; width: 100vw; height: calc(100vh - 50px); }
        #canvas-3d { flex: 1; background: radial-gradient(circle, #ffffff 0%, #dbe3eb 100%); position: relative; }
        #sidebar { width: 350px; background: white; border-left: 1px solid #ddd; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }

        /* O Editor Visual (Retângulo Guia DAS) */
        h3 { margin: 0; font-size: 16px; color: #333; font-weight: 600; }
        .canvas-2d-wrapper { 
            width: 100%; height: 131px; /* Proporção aproximada de 22.5x9.5 */
            border: 2px dashed #999; background: #fafafa; position: relative; overflow: hidden;
        }

        /* Botão de Carregar Imagem (Estilo Rapid Mockup) */
        .btn-upload { background: var(--rosa); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; font-size: 14px; text-transform: uppercase; }
        .btn-link { background: #333; margin-top: auto; }

        /* Rodapé do Cliente */
        #client-info { position: absolute; top: 10px; left: 10px; padding: 10px; background: white; border-radius: 5px; font-size: 12px; pointer-events: none; display: none; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="canvas-3d">
        <div id="client-info">Interaja com a caneca para ver todos os detalhes</div>
    </div>
    
    <div id="sidebar">
        <h3>Opções de Arte</h3>
        
        <input type="file" id="file-input" style="display:none" accept="image/*">
        <button class="btn-upload" onclick="document.getElementById('file-input').click()">CARREGAR IMAGEM</button>
        
        <p style="font-size: 11px; color: #777; margin: 0;">22.5cm x 9.5cm DAS (Estique pelos cantos):</p>
        
        <div class="canvas-2d-wrapper">
            <canvas id="fabric-canvas" width="310" height="131"></canvas>
        </div>

        <button class="btn-upload btn-link" onclick="gerarLink()">Copiar Link do Cliente</button>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, mug, decal, texture;
    let fabricCanvas;

    // Inicializa o Editor Visual (Fabric.js) - Isso resolve seu pedido de "esticar cantos"
    function initFabric() {
        fabricCanvas = new fabric.Canvas('fabric-canvas', {
            preserveObjectStacking: true,
            backgroundColor: '#ffffff'
        });

        // Quando algo mudar no editor visual (mover, esticar, girar)
        fabricCanvas.on('after:render', () => {
            updateMugTexture();
        });
    }

    function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(35, (window.innerWidth - 350) / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.5, 3); // Aproxima a caneca

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 350, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-3d').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 5, 5);
        scene.add(sun);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        new GLTFLoader().load('caneca.glb', (gltf) => {
            mug = gltf.scene;
            const box = new THREE.Box3().setFromObject(mug);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            mug.position.sub(center);
            scene.add(mug);

            // CRIA A ÁREA DA ESTAMPA (Rapid Mockup System)
            // Um cilindro que é um "pouquinho maior" que a caneca
            const geo = new THREE.CylinderGeometry(size.x/1.96, size.x/1.96, size.y*0.88, 64, 1, true, -Math.PI/1.5, Math.PI*1.3);
            decal = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ 
                transparent: true, 
                side: THREE.DoubleSide,
                // Evita que a textura "pisque" na superfície (Z-fighting)
                polygonOffset: true,
                polygonOffsetFactor: -4
            }));
            decal.rotation.y = Math.PI / 2; // Gira para frente
            scene.add(decal);
            
            checkUrl();
        });

        animate();
    }

    // Sincroniza o editor visual com a caneca 3D
