<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio - Oficial</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #222; color: white; overflow: hidden; }
        #canvas-3d { flex: 1; background: #fff; }
        #sidebar { width: 350px; background: #fff; border-left: 2px solid #3376e3; padding: 20px; color: #333; display: flex; flex-direction: column; }
        .editor-2d { border: 2px solid #3376e3; background: #eee; margin: 15px 0; }
        .btn { background: #3376e3; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-view { background: #444; margin-top: 10px; }
    </style>
</head>
<body>

<div id="canvas-3d"></div>

<aside id="sidebar">
    <h2 style="margin:0">Editor Nostálgicas</h2>
    <p style="font-size:12px">1. Carregue a imagem abaixo:</p>
    
    <input type="file" id="img-input" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('img-input').click()">ESCOLHER ARQUIVO</button>

    <div class="editor-2d">
        <canvas id="f-canvas" width="310" height="135"></canvas>
    </div>

    <button class="btn btn-view" onclick="concluir()">CONCLUIR (Limpar Ajustes)</button>
    <p style="font-size:10px; color:#666; margin-top:10px">Ajuste a largura puxando as laterais azuis. A alça não será pintada.</p>
</aside>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, decal, fCanvas;

    // --- EDITOR 2D ---
    fCanvas = new fabric.Canvas('f-canvas', { backgroundColor: '#ffffff' });
    fabric.Object.prototype.set({
        transparentCorners: false,
        cornerColor: '#3376e3',
        cornerSize: 10,
        lockUniScaling: false
    });

    window.concluir = () => {
        fCanvas.discardActiveObject();
        fCanvas.requestRenderAll();
    };

    fCanvas.on('after:render', () => {
        if (!decal) return;
        const texture = new THREE.CanvasTexture(fCanvas.getElement());
        texture.colorSpace = THREE.SRGBColorSpace;
        decal.material.map = texture;
        decal.material.needsUpdate = true;
    });

    // --- MUNDO 3D ---
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 350) / window.innerHeight, 0.01, 1000);
    camera.position.set(0, 0, 1); 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth - 350, window.innerHeight);
    document.getElementById('canvas-3d').appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 2));

    // --- CARREGAR OBJ COM FILTRO DE SEGURANÇA ---
    new OBJLoader().load('mug.obj', (obj) => {
        const box = new THREE.Box3().setFromObject(obj);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        
        obj.position.sub(center); // Centraliza
        obj.traverse(c => {
            if (c.isMesh) c.material = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1 });
        });
        scene.add(obj);

        // Cilindro da Estampa (Ajustado para não tocar na alça)
        const geo = new THREE.CylinderGeometry(size.x/2 * 1.015, size.x/2 * 1.015, size.y * 0.85, 64, 1, true, -2.1, 4.2);
        decal = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ 
            transparent: true, 
            side: THREE.DoubleSide,
            polygonOffset: true,
            polygonOffsetFactor: -1 
        }));
        decal.rotation.y = Math.PI;
        scene.add(decal);

        // Posiciona a câmara dinamicamente para o objeto aparecer
        camera.position.z = size.z * 3.5;
        controls.update();
    });

    // --- CARREGAMENTO DE IMAGEM ---
    document.getElementById('img-input').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                img.scaleToHeight(120);
                fCanvas.add(img);
                fCanvas.setActiveObject(img);
                fCanvas.centerObject(img);
            });
        };
        reader.readAsDataURL(file);
    };

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
