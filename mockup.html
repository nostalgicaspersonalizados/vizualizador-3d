<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nostálgicas Studio - Mockup 3D</title>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root { --panel: #2a2a2a; }

body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: sans-serif;
    background: #1a1a1a;
    color: white;
    overflow: hidden;
}

#render-3d {
    flex: 1;
    background: #ffffff;
}

#sidebar {
    width: 380px;
    background: var(--panel);
    padding: 20px;
    border-left: 1px solid #444;
    display: flex;
    flex-direction: column;
}

.canvas-area {
    background: #3d3d3d;
    padding: 5px;
    margin-bottom: 20px;
    border: 1px solid #555;
}

.button-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.btn {
    background: transparent;
    color: white;
    border: 2px solid white;
    padding: 12px;
    cursor: pointer;
    font-weight: bold;
    font-size: 11px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
}

.btn-success {
    background: #2f855a;
    border: none;
    grid-column: span 2;
    margin-top: 10px;
}

.controls {
    margin-top: 20px;
    border-top: 1px solid #555;
    padding-top: 15px;
}

input[type="range"] {
    width: 100%;
    margin-bottom: 15px;
    accent-color: white;
}
</style>
</head>

<body>

<div id="render-3d"></div>

<aside id="sidebar">
<div style="font-size: 12px; margin-bottom: 10px; color: #aaa;">LAYOUT: 210 x 95mm</div>

<div class="canvas-area">
<canvas id="canvas2d" width="340" height="155"></canvas>
</div>

<div class="button-grid">
<input type="file" id="up-img" style="display:none" accept="image/*">
<button class="btn" onclick="document.getElementById('up-img').click()">
<i class="fa-regular fa-image"></i> IMAGEM
</button>

<button class="btn" onclick="addText()">
<i class="fa-solid fa-font"></i> TEXTO
</button>

<button class="btn-success btn" onclick="takePhoto()">
<i class="fa-solid fa-camera"></i> SALVAR FOTO
</button>
</div>

<div class="controls">
<label style="font-size: 10px; color: #888;">GIRAR CANECA</label>
<input type="range" id="rot" min="-1" max="1" step="0.01" value="0">

<label style="font-size: 10px; color: #888;">ZOOM</label>
<input type="range" id="cam-z" min="3" max="10" step="0.1" value="6">
</div>
</aside>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

//// FABRIC
const fCanvas = new fabric.Canvas('canvas2d', {
    backgroundColor: '#fff'
});

// Área segura
const guide = new fabric.Rect({
    left: 10,
    top: 10,
    width: 320,
    height: 135,
    fill: 'transparent',
    stroke: 'red',
    selectable: false,
    evented: false
});
fCanvas.add(guide);

//// THREE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const camera = new THREE.PerspectiveCamera(
    45,
    (window.innerWidth - 380) / window.innerHeight,
    0.1,
    1000
);
camera.position.set(0, 0, 6);

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth - 380, window.innerHeight);

document.getElementById('render-3d').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 1.5));

const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

//// TEXTURA
const texture3d = new THREE.CanvasTexture(fCanvas.getElement());
texture3d.colorSpace = THREE.SRGBColorSpace;
texture3d.wrapS = THREE.RepeatWrapping;
texture3d.anisotropy = renderer.capabilities.getMaxAnisotropy();

fCanvas.on('after:render', () => {
    texture3d.needsUpdate = true;
});

//// CANECA
const geometry = new THREE.CylinderGeometry(1, 1, 2.2, 64, 1, true);

const material = new THREE.MeshPhongMaterial({
    color: 0xffffff,
    map: texture3d,
    side: THREE.DoubleSide,
    shininess: 100
});

const caneca = new THREE.Mesh(geometry, material);
scene.add(caneca);

// ALÇA
const handleGeo = new THREE.TorusGeometry(0.6, 0.1, 16, 32, Math.PI);
const handleMat = new THREE.MeshPhongMaterial({ color: 0xffffff });

const handle = new THREE.Mesh(handleGeo, handleMat);
handle.position.set(1, 0, 0);
handle.rotation.z = -Math.PI / 2;

caneca.add(handle);

//// FUNÇÕES
window.addText = () => {
    fCanvas.add(new fabric.IText('Texto', {
        left: 50,
        top: 50
    }));
};

document.getElementById('up-img').onchange = (e) => {
    const r = new FileReader();

    r.onload = (f) => {
        fabric.Image.fromURL(f.target.result, (img) => {
            img.scaleToWidth(120);
            fCanvas.add(img);
            fCanvas.centerObject(img);
        });
    };

    r.readAsDataURL(e.target.files[0]);
};

window.takePhoto = () => {
    fCanvas.discardActiveObject();
    fCanvas.renderAll();

    setTimeout(() => {
        const a = document.createElement('a');
        a.download = 'mockup.png';
        a.href = renderer.domElement.toDataURL('image/png');
        a.click();
    }, 100);
};

//// CONTROLES
document.getElementById('rot').oninput = (e) => {
    caneca.rotation.y = parseFloat(e.target.value) * Math.PI;
};

document.getElementById('cam-z').oninput = (e) => {
    camera.position.z = parseFloat(e.target.value);
    camera.updateProjectionMatrix();
};

//// RESPONSIVO
window.addEventListener('resize', () => {
    const width = window.innerWidth - 380;
    const height = window.innerHeight;

    camera.aspect = width / height;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height);
});

//// LOOP
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
