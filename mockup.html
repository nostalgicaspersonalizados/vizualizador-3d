<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Interativo - Nostálgicas</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; overflow: hidden; }
        
        /* Painel de Controle (Admin) */
        #admin-panel { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(255,255,255,0.95); padding: 20px; 
            border-radius: 12px; z-index: 100; width: 280px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: block; /* Mude para 'none' se quiser esconder do cliente */
        }

        h3 { margin-top: 0; color: #333; font-size: 16px; border-bottom: 1px solid #ddd; padding-bottom: 8px; }
        label { display: block; margin-top: 12px; font-size: 13px; color: #666; }
        input[type="range"] { width: 100%; cursor: pointer; }
        input[type="file"] { font-size: 12px; margin-top: 5px; }
        
        .client-info {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            pointer-events: none; color: #888; font-size: 12px;
        }

        canvas { display: block; }
    </style>
</head>
<body>

<div id="admin-panel">
    <h3>Painel de Ajuste</h3>
    <label>1. Carregar Estampa (.jpg / .png)</label>
    <input type="file" id="upload" accept="image/*">
    
    <label>Zoom da Estampa</label>
    <input type="range" id="scale" min="0.1" max="5" step="0.1" value="1">
    
    <label>Posição Horizontal (Girar)</label>
    <input type="range" id="offsetX" min="0" max="1" step="0.01" value="0">
    
    <label>Posição Vertical (Altura)</label>
    <input type="range" id="offsetY" min="0" max="1" step="0.01" value="0">

    <p style="font-size: 10px; color: #999; margin-top: 15px;">
        * Use o mouse para girar a caneca em 360°.
    </p>
</div>

<div class="client-info">Interaja com a caneca para ver todos os detalhes</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, mugModel, texture;

    // Elementos da Interface
    const uploadInput = document.getElementById('upload');
    const scaleInput = document.getElementById('scale');
    const offsetXInput = document.getElementById('offsetX');
    const offsetYInput = document.getElementById('offsetY');

    init();

    function init() {
        // 1. Cena e Câmera
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 5);

        // 2. Renderizador
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 3. Luzes
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.6);
        sunLight.position.set(5, 10, 7.5);
        scene.add(sunLight);

        // 4. Controles de Mouse/Toque
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 2;
        controls.maxDistance = 10;

        // 5. Carregar o Modelo da Caneca
        const loader = new GLTFLoader();
        loader.load('caneca.glb', (gltf) => {
            mugModel = gltf.scene;
            
            // Centralizar modelo
            const box = new THREE.Box3().setFromObject(mugModel);
            const center = box.getCenter(new THREE.Vector3());
            mugModel.position.sub(center);
            
            scene.add(mugModel);
            
            // VERIFICA SE EXISTE FOTO NO LINK (Ex: ?foto=estampa1.jpg)
            checkUrlParams();
        }, undefined, (error) => {
            console.error('Erro ao carregar caneca.glb. Verifique o nome do arquivo.', error);
        });

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    // Função para ler parâmetros da URL
    function checkUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const fotoUrl = params.get('foto');
        if (fotoUrl) {
            applyTexture(fotoUrl);
            // Se for link de cliente, esconde o painel administrativo
            document.getElementById('admin-panel').style.display = 'none';
        }
    }

    // Aplicar Textura no Modelo
    function applyTexture(source) {
        const texLoader = new THREE.TextureLoader();
        texLoader.load(source, (tex) => {
            texture = tex;
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            
            // Ajuste inicial para preencher a caneca
            updateTextureMapping();

            mugModel.traverse((child) => {
                if (child.isMesh) {
                    child.material.map = texture;
                    child.material.needsUpdate = true;
                }
            });
        });
    }

    function updateTextureMapping() {
        if (!texture) return;
        const s = 1 / parseFloat(scaleInput.value);
        texture.repeat.set(s, s);
        texture.offset.set(parseFloat(offsetXInput.value), parseFloat(offsetYInput.value));
    }

    // Eventos de Input
    uploadInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => applyTexture(event.target.result);
            reader.readAsDataURL(file);
        }
    });

    [scaleInput, offsetXInput, offsetYInput].forEach(input => {
        input.addEventListener('input', updateTextureMapping);
    });

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
