<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio - Versão Final de Sucesso</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #1a1a1a; overflow: hidden; }
        #render-3d { flex: 1; background: #fff; }
        #controles { width: 350px; background: #ffffff; border-left: 3px solid #3376e3; padding: 20px; box-shadow: -10px 0 20px rgba(0,0,0,0.2); z-index: 10; display: flex; flex-direction: column; }
        .canvas-container { border: 2px solid #3376e3; margin: 15px 0; background: #fdfdfd; border-radius: 5px; }
        .btn { background: #3376e3; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .btn-limpar { background: #4a5568; margin-top: 10px; padding: 10px; }
        h2 { color: #333; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>

<div id="render-3d"></div>

<aside id="controles">
    <h2>Nostálgicas Studio</h2>
    
    <input type="file" id="input-imagem" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('input-imagem').click()">📂 CARREGAR ARTE</button>

    <div class="canvas-container">
        <canvas id="editor-2d" width="310" height="140"></canvas>
    </div>

    <button class="btn btn-limpar" onclick="limparAjustes()">✔️ FINALIZAR (Limpar bordas)</button>
</aside>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, caneca, estampa, fCanvas;

    // --- 1. EDITOR 2D (FABRIC.JS) ---
    fCanvas = new fabric.Canvas('editor-2d', { backgroundColor: '#ffffff' });
    
    window.limparAjustes = () => {
        fCanvas.discardActiveObject();
        fCanvas.requestRenderAll();
    };

    fCanvas.on('after:render', () => {
        if (!estampa) return;
        const texture = new THREE.CanvasTexture(fCanvas.getElement());
        texture.colorSpace = THREE.SRGBColorSpace;
        estampa.material.map = texture;
        estampa.material.needsUpdate = true;
    });

    // --- 2. AMBIENTE 3D ---
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 350) / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 10); // Câmera posicionada para ver objetos maiores

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth - 350, window.innerHeight);
    document.getElementById('render-3d').appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 2));

    // --- 3. CARREGAR MUG.OBJ (COM AJUSTE DE ESCALA) ---
    new OBJLoader().load('mug.obj', (obj) => {
        caneca = obj;

        // AJUSTE DE ESCALA: Se a caneca for minúscula, nós forçamos ela a crescer 50x
        caneca.scale.set(50, 50, 50); 

        const box = new THREE.Box3().setFromObject(caneca);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        
        caneca.position.sub(center); // Centraliza no mundo

        caneca.traverse(c => {
            if (c.isMesh) c.material = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1 });
        });
        scene.add(caneca);

        // Criar Estampa (Protegendo a alça)
        const raio = (size.x / 2) * 1.02;
        const altura = size.y * 0.85;
        const geo = new THREE.CylinderGeometry(raio, raio, altura, 64, 1, true, -2.2, 4.4);
        
        estampa = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ 
            transparent: true, 
            side: THREE.DoubleSide,
            polygonOffset: true, 
            polygonOffsetFactor: -1 
        }));
        estampa.rotation.y = Math.PI;
        scene.add(estampa);

        // Câmera foca no tamanho final da caneca
        camera.position.z = size.z * 2.5;
        controls.update();
    });

    // --- 4. CARREGAR IMAGEM ---
    document.getElementById('input-imagem').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            fabric.Image.fromURL(event.target.result, (img) => {
                img.scaleToWidth(150);
                fCanvas.add(img);
                fCanvas.centerObject(img);
                fCanvas.setActiveObject(img);
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
