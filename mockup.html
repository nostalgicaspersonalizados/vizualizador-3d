<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio - Mockup 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', Arial; background: #000; overflow: hidden; }
        
        /* MENU LATERAL FIXO */
        #sidebar { 
            width: 340px; min-width: 340px; background: #151515; color: white; 
            padding: 20px; border-right: 3px solid #2ecc71; overflow-y: auto; z-index: 100;
        }

        /* ÁREA DO 3D - FUNDO ESCURO PARA CONTRASTE */
        #render-3d { flex: 1; background: #222; cursor: move; position: relative; }

        .logo { color: #2ecc71; font-weight: bold; font-size: 22px; margin-bottom: 5px; }
        .canvas-box { background: white; border: 2px solid #333; margin-bottom: 15px; line-height: 0; border-radius: 5px; overflow: hidden; }
        
        .btn { width: 100%; padding: 12px; margin-bottom: 10px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px; text-transform: uppercase; transition: 0.3s; }
        .btn-gray { background: #333; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-red { background: #c0392b; color: white; font-size: 10px; padding: 5px; }

        label { display: block; font-size: 11px; color: #777; margin: 15px 0 5px 0; text-transform: uppercase; }
        input[type="range"] { width: 100%; accent-color: #2ecc71; }

        .colors { display: flex; gap: 10px; margin-top: 5px; }
        .c-circle { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid #444; }
        .c-circle.active { border-color: #2ecc71; transform: scale(1.1); }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="logo">NOSTÁLGICAS</div>
    <p style="font-size: 10px; color: #555; margin-bottom: 20px;">ESTÚDIO DE PERSONALIZADOS</p>

    <label>Desenho da Estampa (22,5x9,5cm)</label>
    <div class="canvas-box">
        <canvas id="c2d" width="450" height="190" style="width: 100%; height: auto;"></canvas>
    </div>

    <div style="display: flex; gap: 5px;">
        <button class="btn btn-gray" onclick="document.getElementById('file').click()">+ Foto</button>
        <button class="btn btn-gray" onclick="addTxt()">+ Texto</button>
    </div>
    <input type="file" id="file" style="display:none" accept="image/*">
    <button class="btn btn-red" onclick="delObj()">Apagar Selecionado</button>

    <label>Cor do Interior / Alça</label>
    <div class="colors">
        <div class="c-circle active" style="background:#ffffff" onclick="changeMug(this, '#ffffff')"></div>
        <div class="c-circle" style="background:#111111" onclick="changeMug(this, '#111111')"></div>
        <div class="c-circle" style="background:#ffc0cb" onclick="changeMug(this, '#ffc0cb')"></div>
        <div class="c-circle" style="background:#f1c40f" onclick="changeMug(this, '#f1c40f')"></div>
    </div>

    <label>Girar Arte na Caneca</label>
    <input type="range" id="slide-rot" min="-0.5" max="0.5" step="0.001" value="0">

    <label>Zoom (Distância)</label>
    <input type="range" id="slide-zoom" min="4" max="10" step="0.1" value="7">

    <button class="btn btn-green" style="margin-top: 20px;" onclick="baixar()">Baixar Mockup para Cliente</button>
</aside>

<div id="render-3d"></div>

<script>
    // --- 1. EDITOR 2D (FABRIC.JS) ---
    const fCanvas = new fabric.Canvas('c2d', { backgroundColor: '#ffffff' });
    fCanvas.on('after:render', () => { if(tex) tex.needsUpdate = true; });

    function addTxt() {
        const t = new fabric.IText('Seu Texto', { left: 50, top: 50, fontSize: 30, fill: '#000' });
        fCanvas.add(t).setActiveObject(t);
    }
    function delObj() { const o = fCanvas.getActiveObject(); if(o) fCanvas.remove(o); }

    document.getElementById('file').onchange = (e) => {
        const r = new FileReader();
        r.onload = (f) => fabric.Image.fromURL(f.target.result, (img) => {
            img.scaleToWidth(150); fCanvas.add(img).centerObject(img);
        });
        r.readAsDataURL(e.target.files[0]);
    };

    // --- 2. MOTOR 3D (THREE.JS) ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222); // Fundo cinza escuro fixo
    const container = document.getElementById('render-3d');
    
    const cam = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
    cam.position.set(0, 1, 7);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // Luzes para dar brilho na cerâmica
    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const light = new THREE.DirectionalLight(0xffffff, 0.6);
    light.position.set(5, 10, 7);
    scene.add(light);

    // --- 3. CONSTRUÇÃO DA CANECA ---
    const tex = new THREE.CanvasTexture(fCanvas.getElement());
    tex.wrapS = THREE.RepeatWrapping;
    
    const matExt = new THREE.MeshPhongMaterial({ map: tex, shininess: 80 });
    const matPlain = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 80 });

    const mugGroup = new THREE.Group();

    // Lado de Fora
    const ptsE = []; for(let i=0; i<=10; i++) ptsE.push(new THREE.Vector2(1.1, (i-5)*0.25));
    mugGroup.add(new THREE.Mesh(new THREE.LatheGeometry(ptsE, 64), matExt));

    // Lado de Dentro (Invertido)
    const ptsI = []; for(let i=0; i<=10; i++) ptsI.push(new THREE.Vector2(1.05, (i-5)*0.24));
    const innerMug = new THREE.Mesh(new THREE.LatheGeometry(ptsI, 64), matPlain);
    innerMug.rotation.x = Math.PI;
    mugGroup.add(innerMug);

    // Borda Superior e Fundo
    const ring = new THREE.Mesh(new THREE.RingGeometry(1.05, 1.1, 64), matPlain);
    ring.rotation.x = -Math.PI/2; ring.position.y = 1.25;
    mugGroup.add(ring);

    const bottom = new THREE.Mesh(new THREE.CircleGeometry(1.1, 64), matPlain);
    bottom.rotation.x = -Math.PI/2; bottom.position.y = -1.25;
    mugGroup.add(bottom);

    // Alça
    const handle = new THREE.Mesh(new THREE.TorusGeometry(0.75, 0.12, 12, 48, Math.PI), matPlain);
    handle.position.set(1.1, 0, 0); handle.rotation.z = -Math.PI/2;
    mugGroup.add(handle);

    scene.add(mugGroup);

    // --- 4. CONTROLES E FUNÇÕES ---
    window.changeMug = (btn, cor) => {
        matPlain.color.set(cor);
        document.querySelectorAll('.c-circle').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
    };

    window.baixar = () => {
        fCanvas.discardActiveObject(); fCanvas.renderAll();
        setTimeout(() => {
            const a = document.createElement('a');
            a.download = 'Mockup_Nostalgicas.png';
            a.href = renderer.domElement.toDataURL();
            a.click();
        }, 100);
    };

    // Rotação com o Mouse
    let isDown = false; let lastX;
    container.onmousedown = (e) => { isDown = true; lastX = e.clientX; };
    window.onmouseup = () => isDown = false;
    window.onmousemove = (e) => {
        if(!isDown) return;
        mugGroup.rotation.y += (e.clientX - lastX) * 0.01;
        lastX = e.clientX;
    };

    // Sliders
    document.getElementById('slide-rot').oninput = (e) => tex.offset.x = parseFloat(e.target.value);
    document.getElementById('slide-zoom').oninput = (e) => cam.position.z = parseFloat(e.target.value);

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, cam);
    }
    animate();

    // Ajuste de Janela
    window.onresize = () => {
        cam.aspect = container.clientWidth / container.clientHeight;
        cam.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    };
</script>
</body>
</html>
