<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio - Power Mockup</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --accent: #2ecc71; --dark: #1a1a1a; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #000; overflow: hidden; }
        
        /* SIDEBAR ESTILO RAPID MOCKUP */
        #sidebar { 
            width: 350px; min-width: 350px; background: var(--dark); color: white; 
            padding: 20px; border-right: 3px solid var(--accent); overflow-y: auto; z-index: 10;
        }

        #render-3d { flex: 1; background: #eee; cursor: move; position: relative; }

        .section-title { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .canvas-area { background: white; margin-bottom: 10px; border-radius: 4px; overflow: hidden; line-height: 0; }
        
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 10px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px; text-transform: uppercase; font-size: 11px; transition: 0.2s; }
        .btn-main { background: #333; color: white; border: 1px solid #555; }
        .btn-main:hover { background: #444; }
        .btn-action { background: var(--accent); color: white; }
        .btn-danger { background: #e74c3c; color: white; }

        label { display: block; font-size: 10px; color: #888; margin: 10px 0 5px 0; }
        input[type="range"] { width: 100%; accent-color: var(--accent); }

        .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .c-pill { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #444; }
        .c-pill.active { border-color: var(--accent); transform: scale(1.1); }

        .bg-select { width: 100%; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<aside id="sidebar">
    <h2 style="margin:0; font-size: 22px; color: var(--accent);">NOSTÁLGICAS</h2>
    <p style="font-size: 10px; color: #666;">Mockup System v2.0</p>

    <div class="section-title">1. Design da Estampa</div>
    <div class="canvas-area">
        <canvas id="c2d" width="450" height="190" style="width: 100%; height: auto;"></canvas>
    </div>
    
    <div class="grid-btns">
        <button class="btn btn-main" onclick="document.getElementById('up').click()">+ Imagem</button>
        <button class="btn btn-main" onclick="addTexto()">+ Texto</button>
    </div>
    <input type="file" id="up" style="display:none" accept="image/*">
    <button class="btn btn-danger" style="width:100%; margin-top:10px;" onclick="remover()">Remover Selecionado</button>

    <div class="section-title">2. Configuração da Caneca</div>
    <label>Cor Interna / Alça</label>
    <div class="color-row">
        <div class="c-pill active" style="background:#ffffff" onclick="chMugColor(this, '#ffffff')"></div>
        <div class="c-pill" style="background:#111111" onclick="chMugColor(this, '#111111')"></div>
        <div class="c-pill" style="background:#ffc0cb" onclick="chMugColor(this, '#ffc0cb')"></div>
        <div class="c-pill" style="background:#3498db" onclick="chMugColor(this, '#3498db')"></div>
    </div>

    <label>Girar Arte na Caneca</label>
    <input type="range" id="rot" min="-0.5" max="0.5" step="0.001" value="0">

    <div class="section-title">3. Cenário e Câmera</div>
    <label>Fundo do Mockup</label>
    <select class="bg-select" onchange="chBackground(this.value)">
        <option value="radial-gradient(circle, #ffffff 0%, #bbbbbb 100%)">Estúdio Clean</option>
        <option value="url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?q=80&w=1000') center/cover">Cozinha Moderna</option>
        <option value="url('https://images.unsplash.com/photo-1517817748493-49ec54a32465?q=80&w=1000') center/cover">Mesa de Madeira</option>
        <option value="#333">Cinza Escuro</option>
    </select>

    <label>Altura (Câmera)</label>
    <input type="range" id="camY" min="-1" max
