<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio - Controle Total</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #1a1a1a; overflow: hidden; }
        #render-3d { flex: 1; background: #fff; }
        #sidebar { width: 350px; background: #ffffff; border-left: 3px solid #3376e3; padding: 20px; box-shadow: -10px 0 20px rgba(0,0,0,0.2); z-index: 10; display: flex; flex-direction: column; overflow-y: auto; }
        .canvas-container { border: 2px solid #3376e3; margin: 15px 0; background: #fdfdfd; border-radius: 5px; }
        .btn { background: #3376e3; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .controles-manuais { margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        label { font-size: 11px; font-weight: bold; display: block; margin-top: 12px; color: #333; }
        input[type="range"] { width: 100%; cursor: pointer; margin-bottom: 5px; }
        .destaque { color: #3376e3; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div id="render-3d"></div>

<aside id="sidebar">
    <h2 style="color:#333; margin:0">Nostálgicas Studio</h2>
    
    <input type="file" id="input-imagem" style="display:none" accept="image/*">
    <button class="btn" style="margin-top:15px" onclick="document.getElementById('input-imagem').click()">📂 CARREGAR ARTE</button>

    <div class="canvas-container">
        <canvas id="editor-2d" width="310" height="140"></canvas>
    </div>

    <div class="controles-manuais">
        <b class="destaque">Ajustes da Caneca</b>
        <label>TAMANHO DA CANECA (ESCALA)</label>
        <input type="range" id="escala-caneca" min="10" max="150" step="1" value="50">

        <b class="destaque" style="margin-top:20px">Ajustes da Arte</b>
        <label>ABERTURA/FECHAMENTO (COBERTURA)</label>
        <input type="range" id="abertura-arte" min="1.0" max="6.28" step="0.1" value="3.8">

        <label>GIRAR POSIÇÃO NO CORPO</label>
        <input type="range" id="rotacao" min="-6.28" max="6.28" step="0.01" value="0">
        
        <label>ALTURA E ZOOM DA ARTE</label>
        <input type="range" id="altura" min="-2" max="2" step="0.01" value="0">
        <input type="range" id="zoom-arte" min="0.5" max="1.5" step="0.01" value="1.0">

        <label style="color: #2e7d32; margin-top:20px">🔍 ZOOM DA CÂMERA</label>
        <input type="range" id="zoom-camera" min="0.5" max="15" step="0.1" value="5">
    </div>

    <button class="btn" style="background:#444; margin-top:20px" onclick="fCanvas.discardActiveObject(); fCanvas.requestRenderAll();">✔️ LIMPAR BORDAS</button>
</aside>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, caneca, estampa, fCanvas, lastSize;

    fCanvas = new fabric.Canvas('editor-2d', { backgroundColor: '#ffffff' });
    fCanvas.on('after:render', () => {
        if (estampa) {
            const texture = new THREE.CanvasTexture(fCanvas.getElement());
            texture.colorSpace = THREE.SRGBColorSpace;
            estampa.material.map = texture;
            estampa.material.needsUpdate = true;
        }
    });

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 350) / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth - 350, window.innerHeight);
    document.getElementById('render-3d').appendChild(renderer.domElement);
    controls = new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 2));

    function criarEstampa(raio, altura, abertura) {
        if (estampa) {
            scene.remove(estampa);
            estampa.geometry.dispose();
        }
        const geo = new THREE.CylinderGeometry(raio * 1.015, raio * 1.015, altura, 64, 1, true, -(abertura/2), abertura);
        estampa = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ transparent: true, side: THREE.DoubleSide }));
        scene.add(estampa);
    }

    new OBJLoader().load('mug.obj', (obj) => {
        caneca = obj;
        caneca.scale.set(50, 50, 50);
        const box = new THREE.Box3().setFromObject(caneca);
        const center = box.getCenter(new THREE.Vector3());
        lastSize = box.getSize(new THREE.Vector3());
        caneca.position.sub(center);
        caneca.traverse(c => { if (c.isMesh) c.material = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1 }); });
        scene.add(caneca);

        criarEstampa(lastSize.x/2, lastSize.y*0.85, 3.8);
        camera.position.z = lastSize.z * 1.5;
        controls.update();
    });

    // 1. TAMANHO DA CANECA
    document.getElementById('escala-caneca').oninput = (e) => {
        if (caneca) {
            const s = parseFloat(e.target.value);
            caneca.scale.set(s, s, s);
            const box = new THREE.Box3().setFromObject(caneca);
            lastSize = box.getSize(new THREE.Vector3());
            const abertura = parseFloat(document.getElementById('abertura-arte').value);
            criarEstampa(lastSize.x/2, lastSize.y*0.85, abertura);
        }
    };

    // 2. ABERTURA E FECHAMENTO DA ARTE
    document.getElementById('abertura-arte').oninput = (e) => {
        if (caneca && lastSize) {
            const abertura = parseFloat(e.target.value);
            criarEstampa(lastSize.x/2, lastSize.y*0.85, abertura);
        }
    };

    document.getElementById('zoom-camera').oninput = (e) => { camera.position.z = parseFloat(e.target.value); };
    document.getElementById('rotacao').oninput = (e) => { if (estampa) estampa.rotation.y = parseFloat(e.target.value); };
    document.getElementById('altura').oninput = (e) => { if (estampa) estampa.position.y = parseFloat(e.target.value); };
    document.getElementById('zoom-arte').oninput = (e) => { if (estampa) { const s = parseFloat(e.target.value); estampa.scale.set(s, s, s); } };

    document.getElementById('input-imagem').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            fabric.Image.fromURL(event.target.result, (img) => {
                img.scaleToWidth(150);
                fCanvas.add(img);
                fCanvas.centerObject(img);
                fCanvas.setActiveObject(img);
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    animate();
</script>
</body>
</html>
