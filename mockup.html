<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Studio - Envelopamento Profissional</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        :root { --primary: #3376e3; --bg: #f4f4f9; --panel: #ffffff; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; }
        #render-3d { flex: 1; background: #fff; cursor: grab; }
        #sidebar { width: 380px; background: var(--panel); border-left: 1px solid #ddd; padding: 25px; display: flex; flex-direction: column; overflow-y: auto; box-shadow: -5px 0 15px rgba(0,0,0,0.05); }
        h2 { color: var(--primary); margin: 0 0 20px 0; font-size: 20px; text-transform: uppercase; border-bottom: 2px solid #eee; padding-bottom: 10px; text-align: center; }
        .section-title { font-size: 11px; font-weight: 800; color: #aaa; text-transform: uppercase; margin: 15px 0 8px 0; display: block; }
        .canvas-container { border: 2px dashed #3376e3; margin-bottom: 15px; border-radius: 8px; background: #f9f9f9; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 6px; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { filter: brightness(1.1); }
        .btn-save { background: #2f855a; margin-top: 15px; }
        .control-group { background: #fdfdfd; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; }
        label { font-size: 11px; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 5px; color: #444; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--primary); }
    </style>
</head>
<body>

<div id="render-3d"></div>

<aside id="sidebar">
    <h2>Nostálgicas Studio</h2>
    
    <input type="file" id="input-imagem" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('input-imagem').click()">📂 CARREGAR ARTE</button>

    <div class="canvas-container">
        <canvas id="canvas2d" width="330" height="150"></canvas>
    </div>

    <span class="section-title">Efeito Envelope (Ajuste Direto)</span>
    <div class="control-group">
        <label>Largura do Envelope <span>(Esticar)</span></label>
        <input type="range" id="zoom-horizontal" min="0.5" max="2.5" step="0.01" value="1.0">

        <label>Altura do Envelope</label>
        <input type="range" id="zoom-vertical" min="0.5" max="2.0" step="0.01" value="1.0">

        <label>Girar Arte na Caneca</label>
        <input type="range" id="rotacao" min="-1" max="1" step="0.001" value="0">
        
        <label>Ajuste de Altura (Y)</label>
        <input type="range" id="pos-vertical" min="-0.5" max="0.5" step="0.01" value="0">
    </div>

    <span class="section-title">Câmera e Luz</span>
    <div class="control-group">
        <label>Aproximar Visão</label>
        <input type="range" id="zoom-camera" min="2" max="12" step="0.1" value="6">
    </div>

    <button class="btn btn-save" onclick="salvarFoto()">📸 SALVAR FOTO PARA CLIENTE</button>
</aside>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, canecaMesh, fCanvas, texture3d;

    // --- 1. CONFIGURAÇÃO DO EDITOR 2D ---
    fCanvas = new fabric.Canvas('canvas2d', { backgroundColor: '#ffffff' });
    fCanvas.on('after:render', () => { if (texture3d) texture3d.needsUpdate = true; });

    // --- 2. AMBIENTE 3D ---
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    camera = new THREE.PerspectiveCamera(40, (window.innerWidth - 380) / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 6);

    renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth - 380, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('render-3d').appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 2.0));
    const spot = new THREE.SpotLight(0xffffff, 0.5);
    spot.position.set(5, 10, 5);
    scene.add(spot);

    // --- 3. MAPEAMENTO UV PARA ENVELOPAMENTO ---
    function aplicarMapeamentoEnvelope(geometry) {
        const uvAttribute = geometry.attributes.uv;
        const positions = geometry.attributes.position;
        for (let i = 0; i < positions.count; i++) {
            const x = positions.getX(i);
            const y = positions.getY(i);
            const z = positions.getZ(i);

            // Cálculo polar para envolver o cilindro
            let u = Math.atan2(x, z) / (Math.PI * 2) + 0.5;
            
            // Projeção vertical
            geometry.computeBoundingBox();
            const min = geometry.boundingBox.min.y;
            const max = geometry.boundingBox.max.y;
            let v = (y - min) / (max - min);

            // Ajuste para a arte não começar "quebrada" na alça
            u = (u + 0.5) % 1.0; 

            uvAttribute.setXY(i, u, v);
        }
        uvAttribute.needsUpdate = true;
    }

    // --- 4. CARREGAR E CONFIGURAR TEXTURA ---
    texture3d = new THREE.CanvasTexture(fCanvas.getElement());
    texture3d.colorSpace = THREE.SRGBColorSpace;
    texture3d.wrapS = THREE.ClampToEdgeWrapping; // Evita que a arte repita na alça
    texture3d.wrapT = THREE.ClampToEdgeWrapping;
    texture3d.anisotropy = 16;

    new OBJLoader().load('mug.obj', (obj) => {
        canecaMesh = obj.children[0];
        obj.scale.set(50, 50, 50);
        
        const box = new THREE.Box3().setFromObject(obj);
        const center = box.getCenter(new THREE.Vector3());
        obj.position.sub(center);

        aplicarMapeamentoEnvelope(canecaMesh.geometry);

        canecaMesh.material = new THREE.MeshPhysicalMaterial({ 
            color: 0xffffff,
            map: texture3d,
            roughness: 0.1,
            clearcoat: 1.0
        });

        scene.add(obj);
    });

    // --- 5. LÓGICA DO ENVELOPE (CONTROLES) ---
    function atualizarEnvelope() {
        if (!texture3d) return;

        const zoomH = parseFloat(document.getElementById('zoom-horizontal').value);
        const zoomV = parseFloat(document.getElementById('zoom-vertical').value);
        const rot = parseFloat(document.getElementById('rotacao').value);
        const posV = parseFloat(document.getElementById('pos-vertical').value);

        // O 'Repeat' controla o quanto a arte estica em volta da caneca
        // Valores menores que 1 fazem a arte "envelopar" mais
        texture3d.repeat.set(1 / zoomH, 1 / zoomV);

        // O 'Offset' centraliza a arte após esticar
        texture3d.offset.x = rot + (1 - (1 / zoomH)) / 2;
        texture3d.offset.y = posV + (1 - (1 / zoomV)) / 2;
    }

    document.getElementById('zoom-horizontal').oninput = atualizarEnvelope;
    document.getElementById('zoom-vertical').oninput = atualizarEnvelope;
    document.getElementById('rotacao').oninput = atualizarEnvelope;
    document.getElementById('pos-vertical').oninput = atualizarEnvelope;
    document.getElementById('zoom-camera').oninput = (e) => camera.position.z = e.target.value;

    // --- 6. UPLOAD E SALVAMENTO ---
    document.getElementById('input-imagem').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            fabric.Image.fromURL(event.target.result, (img) => {
                img.scaleToWidth(250);
                fCanvas.clear();
                fCanvas.setBackgroundColor('#ffffff', fCanvas.renderAll.bind(fCanvas));
                fCanvas.add(img);
                fCanvas.centerObject(img);
                fCanvas.setActiveObject(img);
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    window.salvarFoto = () => {
        fCanvas.discardActiveObject();
        fCanvas.requestRenderAll();
        setTimeout(() => {
            const link = document.createElement('a');
            link.download = 'Mockup_Nostalgicas_Envelope.png';
            link.href = renderer.domElement.toDataURL('image/png');
            link.click();
        }, 100);
    };

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
