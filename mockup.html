<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio - Mockup 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #000; overflow: hidden; }
        #render-3d { flex: 1; background: #ffffff; }
        #sidebar { width: 320px; background: #1a1a1a; padding: 20px; border-left: 3px solid #2ecc71; color: white; }
        .canvas-area { background: #fff; margin-bottom: 15px; border: 1px solid #2ecc71; }
        .btn { width: 100%; padding: 12px; margin-bottom: 10px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px; text-transform: uppercase; }
        .btn-img { background: #333; color: #fff; }
        .btn-save { background: #2ecc71; color: #fff; }
        label { font-size: 10px; color: #888; display: block; margin-top: 15px; }
        input[type="range"] { width: 100%; accent-color: #2ecc71; }
    </style>
</head>
<body>

<div id="render-3d"></div>

<aside id="sidebar">
    <h2 style="color:#2ecc71; margin:0;">NOSTÁLGICAS</h2>
    <div class="canvas-area">
        <canvas id="canvas2d" width="450" height="190" style="width: 100%; height: auto;"></canvas>
    </div>

    <input type="file" id="up-img" style="display:none" accept="image/*">
    <button class="btn btn-img" onclick="document.getElementById('up-img').click()">Inserir Arte</button>

    <label>Girar Arte</label>
    <input type="range" id="rot" min="-0.5" max="0.5" step="0.001" value="0">
    
    <label>Altura da Câmera</label>
    <input type="range" id="cam-y" min="-1" max="3" step="0.1" value="0.5">

    <button class="btn btn-save" onclick="savePreview()">Salvar Foto</button>
</aside>

<script>
    // 1. Editor 2D
    const fCanvas = new fabric.Canvas('canvas2d', { backgroundColor: '#ffffff' });
    fCanvas.on('after:render', () => { if(texture) texture.needsUpdate = true; });

    // 2. Cena 3D Simples
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const container = document.getElementById('render-3d');
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0.5, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));

    // 3. Caneca Sólida (Cilindro Direto)
    const texture = new THREE.CanvasTexture(fCanvas.getElement());
    texture.wrapS = THREE.RepeatWrapping;

    const mugGeo = new THREE.CylinderGeometry(1.1, 1.1, 2.5, 64, 1, false);
    const mugMat = new THREE.MeshPhongMaterial({ map: texture, color: 0xffffff });
    const mug = new THREE.Mesh(mugGeo, mugMat);
    scene.add(mug);

    // Alça
    const handleGeo = new THREE.TorusGeometry(0.7, 0.12, 12, 48, Math.PI);
    const handle = new THREE.Mesh(handleGeo, new THREE.MeshPhongMaterial({color: 0xffffff}));
    handle.position.set(1.1, 0, 0);
    handle.rotation.z = -Math.PI/2;
    scene.add(handle);

    // 4. Funções
    document.getElementById('up-img').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => fabric.Image.fromURL(f.target.result, (img) => {
            img.scaleToWidth(200); fCanvas.add(img).centerObject(img);
        });
        reader.readAsDataURL(e.target.files[0]);
    };

    window.savePreview = () => {
        fCanvas.discardActiveObject(); fCanvas.renderAll();
        setTimeout(() => {
            const a = document.createElement('a');
            a.download = 'Nostalgicas.png';
            a.href = renderer.domElement.toDataURL();
            a.click();
        }, 100);
    };

    document.getElementById('rot').oninput = (e) => texture.offset.x = parseFloat(e.target.value);
    document.getElementById('cam-y').oninput = (e) => {
        camera.position.y = parseFloat(e.target.value);
        camera.lookAt(0,0,0);
    };

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
