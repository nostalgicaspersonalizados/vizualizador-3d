<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Studio - Preview GLB</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --panel: #222; }
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #111; color: white; overflow: hidden; }
        #render-3d { flex: 1; background: #ffffff; }
        #sidebar { width: 380px; background: var(--panel); padding: 20px; border-left: 1px solid #444; display: flex; flex-direction: column; }
        .canvas-area { background: #333; padding: 5px; border: 1px solid #555; margin-bottom: 20px; position: relative; }
        .dim-label { position: absolute; top: -18px; left: 0; font-size: 9px; color: #888; }
        .btn { background: transparent; color: white; border: 1.5px solid white; padding: 12px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; width: 100%; margin-bottom: 10px; }
        .btn-save { background: #2f855a; border: none; padding: 15px; }
        label { font-size: 10px; color: #aaa; margin-bottom: 5px; display: block; }
        input[type="range"] { width: 100%; margin-bottom: 15px; accent-color: white; }
    </style>
</head>
<body>

<div id="render-3d"></div>

<aside id="sidebar">
    <div class="canvas-area">
        <span class="dim-label">ÁREA DE IMPRESSÃO: 225 x 95 mm</span>
        <canvas id="canvas2d" width="450" height="190"></canvas>
    </div>

    <input type="file" id="up-img" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('up-img').click()"><i class="fa-regular fa-image"></i> INSERIR ARTE</button>
    <button class="btn" onclick="addText()"><i class="fa-solid fa-font"></i> ADICIONAR TEXTO</button>
    <button class="btn btn-save" onclick="takePhoto()"><i class="fa-solid fa-camera"></i> SALVAR PARA CLIENTE</button>

    <label>AJUSTE DA POSIÇÃO</label>
    <input type="range" id="rot" min="-0.5" max="0.5" step="0.001" value="0">
    
    <label>ZOOM DO MOCKUP</label>
    <input type="range" id="zoom" min="3" max="8" step="0.1" value="5">
</aside>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. EDITOR 2D (FABRIC.JS)
    const fCanvas = new fabric.Canvas('canvas2d', { backgroundColor: '#fff' });
    fCanvas.on('after:render', () => { if(texture3d) texture3d.needsUpdate = true; });

    // 2. AMBIENTE 3D
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const camera = new THREE.PerspectiveCamera(40, (window.innerWidth - 380) / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth - 380, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('render-3d').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const sun = new THREE.DirectionalLight(0xffffff, 0.8);
    sun.position.set(5, 5, 5);
    scene.add(sun);

    // 3. TEXTURA DA ARTE
    const texture3d = new THREE.CanvasTexture(fCanvas.getElement());
    texture3d.colorSpace = THREE.SRGBColorSpace;
    texture3d.wrapS = THREE.RepeatWrapping;

    // 4. CARREGAR O NOVO ARQUIVO CANECA.GLB
    const loader = new GLTFLoader();
    loader.load('caneca.glb', (gltf) => {
        const model = gltf.scene;
        
        model.traverse((child) => {
            if (child.isMesh) {
                // Se a parte do modelo for a que recebe a arte (corpo externo)
                // Verificamos se o nome da peça contém 'body' ou 'exterior' (comum em GLBs)
                // Caso contrário, aplicamos em tudo, mas filtramos por material depois
                child.material = new THREE.MeshPhongMaterial({
                    map: texture3d,
                    color: 0xffffff,
                    shininess: 80
                });
            }
        });

        // Centralizar o modelo
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);
        
        scene.add(model);
    }, undefined, (error) => {
        console.error("Erro ao carregar o arquivo .glb:", error);
    });

    // 5. FUNÇÕES DE INTERAÇÃO
    window.addText = () => {
        fCanvas.add(new fabric.IText('Nostálgicas', { left: 100, top: 50, fontSize: 35 }));
    };

    document.getElementById('up-img').onchange = (e) => {
        const r = new FileReader();
        r.onload = (f) => fabric.Image.fromURL(f.target.result, (img) => {
            img.scaleToWidth(200); fCanvas.add(img).centerObject(img);
        });
        r.readAsDataURL(e.target.files[0]);
    };

    window.takePhoto = () => {
        fCanvas.discardActiveObject(); fCanvas.renderAll();
        setTimeout(() => {
            const a = document.createElement('a');
            a.download = 'Mockup_Caneca.png';
            a.href = renderer.domElement.toDataURL();
            a.click();
        }, 100);
    };

    document.getElementById('rot').oninput = (e) => texture3d.offset.x = parseFloat(e.target.value);
    document.getElementById('zoom').oninput = (e) => camera.position.z = e.target.value;

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
