<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio - Zoom Aproximado</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #1a1a1a; overflow: hidden; }
        #render-3d { flex: 1; background: #fff; }
        #sidebar { width: 350px; background: #ffffff; border-left: 3px solid #3376e3; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .canvas-container { border: 2px solid #3376e3; margin: 15px 0; background: #fdfdfd; border-radius: 5px; }
        .btn { background: #3376e3; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .controles-manuais { margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        label { font-size: 11px; font-weight: bold; display: block; margin-top: 8px; color: #333; }
        input[type="range"] { width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div id="render-3d"></div>

<aside id="sidebar">
    <h2 style="font-size:18px; color:#333">Nostálgicas Studio</h2>
    
    <input type="file" id="input-imagem" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('input-imagem').click()">📂 CARREGAR ARTE</button>

    <div class="canvas-container">
        <canvas id="editor-2d" width="310" height="140"></canvas>
    </div>

    <div class="controles-manuais">
        <label style="color: #2e7d32; font-size: 13px;">🔍 APROXIMAR/AFASTAR CÂMERA</label>
        <input type="range" id="zoom-camera" min="0.5" max="20" step="0.1" value="5">

        <label>GIRAR ENCAIXE DA ARTE</label>
        <input type="range" id="rotacao" min="-6.28" max="6.28" step="0.01" value="0">
        
        <label>ALTURA DA ARTE</label>
        <input type="range" id="altura" min="-2" max="2" step="0.01" value="0">
        
        <label>TAMANHO DO DECALQUE</label>
        <input type="range" id="zoom-arte" min="0.5" max="1.5" step="0.01" value="1.0">
    </div>

    <button style="margin-top:15px; background:#444" class="btn" onclick="fCanvas.discardActiveObject(); fCanvas.requestRenderAll();">✔️ LIMPAR BORDAS</button>
</aside>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, caneca, estampa, fCanvas;

    // EDITOR 2D
    fCanvas = new fabric.Canvas('editor-2d', { backgroundColor: '#ffffff' });
    fCanvas.on('after:render', () => {
        if (!estampa) return;
        const texture = new THREE.CanvasTexture(fCanvas.getElement());
        texture.colorSpace = THREE.SRGBColorSpace;
        estampa.material.map = texture;
        estampa.material.needsUpdate = true;
    });

    // AMBIENTE 3D
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    // Câmera iniciando mais próxima (valor 5 em vez de 10)
    camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 350) / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 5); 

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth - 350, window.innerHeight);
    document.getElementById('render-3d').appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 2));

    // CARREGAR CANECA
    new OBJLoader().load('mug.obj', (obj) => {
        caneca = obj;
        caneca.scale.set(50, 50, 50); 
        const box = new THREE.Box3().setFromObject(caneca);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        caneca.position.sub(center);
        
        caneca.traverse(c => { 
            if (c.isMesh) c.material = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1 }); 
        });
        scene.add(caneca);

        // Geometria da Estampa
        const geo = new THREE.CylinderGeometry((size.x/2)*1.015, (size.x/2)*1.015, size.y*0.85, 64, 1, true, -1.9, 3.8);
        estampa = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ transparent: true, side: THREE.DoubleSide }));
        scene.add(estampa);
        
        // Ajuste inicial de foco
        camera.position.z = size.z * 1.5; // Valor menor para ficar mais perto
        controls.update();
    });

    // LÓGICA DO ZOOM DA CÂMERA
    document.getElementById('zoom-camera').addEventListener('input', (e) => {
        camera.position.z = parseFloat(e.target.value);
    });

    // CONTROLES DA ARTE
    document.getElementById('rotacao').addEventListener('input', (e) => {
        if (estampa) estampa.rotation.y = parseFloat(e.target.value);
    });

    document.getElementById('altura').addEventListener('input', (e) => {
        if (estampa) estampa.position.y = parseFloat(e.target.value);
    });

    document.getElementById('zoom-arte').addEventListener('input', (e) => {
        if (estampa) {
            const s = parseFloat(e.target.value);
            estampa.scale.set(s, s, s);
        }
    });

    document.getElementById('input-imagem').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            fabric.Image.fromURL(event.target.result, (img) => {
                img.scaleToWidth(150);
                fCanvas.add(img);
                fCanvas.centerObject(img);
                fCanvas.setActiveObject(img);
        reader.readAsDataURL(e.target.files[0]);
    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    animate();
</script>
</body>
</html>
