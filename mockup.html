<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas - Calibrador de Mockup</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fff; overflow: hidden; }
        #panel { 
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(255,255,255,0.9); padding: 15px; border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 100;
            max-width: 400px; margin: auto;
        }
        .row { margin-bottom: 10px; }
        label { display: block; font-size: 10px; font-weight: bold; color: #333; }
        input[type="range"] { width: 100%; accent-color: #ff4081; }
        .btn { background: #ff4081; color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div id="panel">
    <input type="file" id="upload" style="display:none">
    <button class="btn" onclick="document.getElementById('upload').click()">1. CARREGAR ARTE</button>
    
    <div class="row">
        <label>TAMANHO DA ARTE (ZOOM)</label>
        <input type="range" id="uScale" min="0.01" max="10" step="0.01" value="1">
    </div>
    <div class="row">
        <label>MOVER LATERAL (X)</label>
        <input type="range" id="uOffsetX" min="-5" max="5" step="0.01" value="0">
    </div>
    <div class="row">
        <label>MOVER ALTURA (Y)</label>
        <input type="range" id="uOffsetY" min="-5" max="5" step="0.01" value="0">
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, mug, texture;

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const loader = new GLTFLoader();
        loader.load('caneca.glb', (gltf) => {
            mug = gltf.scene;
            
            // --- AJUSTE DE ESCALA AUTOMÁTICO ---
            const box = new THREE.Box3().setFromObject(mug);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            // Reposiciona a caneca no centro do mundo
            mug.position.x += (mug.position.x - center.x);
            mug.position.y += (mug.position.y - center.y);
            mug.position.z += (mug.position.z - center.z);
            
            // Ajusta a câmera baseado no tamanho do objeto
            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.set(0, size.y / 2, maxDim * 2.5);
            controls.target.set(0, 0, 0);

            scene.add(mug);
        });

        animate();
    }

    document.getElementById('upload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            const loader = new THREE.TextureLoader();
            loader.load(ev.target.result, (tex) => {
                texture = tex;
                // Configuração Crítica:
                texture.wrapS = texture.wrapT = THREE.ClampToEdgeWrapping; 
                
                mug.traverse(child => {
                    if(child.isMesh) {
                        child.material.map = texture;
                        child.material.needsUpdate = true;
                    }
                });
                update();
            });
        };
        reader.readAsDataURL(file);
    });

    function update() {
        if(!texture) return;
        const s = 1 / document.getElementById('uScale').value;
        texture.repeat.set(s, s);
        texture.offset.set(
            parseFloat(document.getElementById('uOffsetX').value),
            parseFloat(document.getElementById('uOffsetY').value)
        );
    }

    ['uScale', 'uOffsetX', 'uOffsetY'].forEach(id => {
        document.getElementById(id).addEventListener('input', update);
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
