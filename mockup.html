<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Studio - Mockup 3D</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #111; color: white; overflow: hidden; }
        #render-3d { flex: 1; background: #ffffff; position: relative; }
        #sidebar { width: 340px; background: #1a1a1a; padding: 20px; border-left: 1px solid #444; display: flex; flex-direction: column; }
        .canvas-area { background: #fff; margin-bottom: 20px; border: 2px solid #2ecc71; line-height: 0; }
        .btn { width: 100%; padding: 12px; margin-bottom: 10px; cursor: pointer; font-weight: bold; border: none; text-transform: uppercase; border-radius: 4px; }
        .btn-upload { background: #444; color: white; }
        .btn-save { background: #2ecc71; color: white; }
        #status-log { position: absolute; top: 10px; left: 10px; color: #666; font-size: 12px; pointer-events: none; }
        label { font-size: 10px; color: #888; margin-bottom: 5px; display: block; }
        input[type="range"] { width: 100%; accent-color: #2ecc71; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="render-3d">
    <div id="status-log">Iniciando sistema...</div>
</div>

<aside id="sidebar">
    <h2 style="color: #2ecc71; margin-top: 0; font-size: 20px;">Nostálgicas Studio</h2>
    
    <div class="canvas-area">
        <canvas id="canvas2d" width="450" height="190" style="width: 100%; height: auto;"></canvas>
    </div>

    <input type="file" id="up-img" style="display:none" accept="image/*">
    <button class="btn btn-upload" onclick="document.getElementById('up-img').click()">Inserir Imagem</button>
    <button class="btn btn-save" onclick="savePreview()">Baixar Foto</button>
    
    <div style="margin-top: 10px; border-top: 1px solid #333; padding-top: 15px;">
        <label>Girar Arte Horizontal</label>
        <input type="range" id="rot" min="-0.5" max="0.5" step="0.001" value="0">
        
        <label>Zoom do Mockup</label>
        <input type="range" id="zoom" min="3" max="10" step="0.1" value="6">
    </div>
</aside>

<script>
    const log = document.getElementById('status-log');

    // 1. EDITOR 2D (FABRIC)
    const fCanvas = new fabric.Canvas('canvas2d', { backgroundColor: '#ffffff' });
    fCanvas.on('after:render', () => { if(texture3d) texture3d.needsUpdate = true; });

    // 2. CENA 3D (THREE.JS)
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    
    const container = document.getElementById('render-3d');
    const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 1.8));

    const texture3d = new THREE.CanvasTexture(fCanvas.getElement());
    texture3d.colorSpace = THREE.SRGBColorSpace;
    texture3d.wrapS = THREE.RepeatWrapping;

    // 3. CARREGANDO O ARQUIVO MUG.GLB
    const loader = new THREE.GLTFLoader();
    
    // Tentativa de carregar o arquivo mudado para mug.glb
    loader.load('./mug.glb', function(gltf) {
        log.innerText = "Mapeando caneca... Sucesso!";
        log.style.color = "green";
        
        const model = gltf.scene;
        model.traverse((child) => {
            if (child.isMesh) {
                child.material = new THREE.MeshPhongMaterial({
                    map: texture3d,
                    color: 0xffffff,
                    shininess: 80,
                    side: THREE.FrontSide // Arte só do lado de fora
                });
            }
        });
        
        // Centraliza a caneca automaticamente
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);
        
        scene.add(model);
    }, 
    (xhr) => {
        if (xhr.total > 0) {
            log.innerText = "Carregando: " + Math.round((xhr.loaded / xhr.total * 100)) + "%";
        }
    }, 
    (error) => {
        console.error(error);
        log.innerText = "ERRO: O arquivo 'mug.glb' não foi encontrado na pasta.";
        log.style.color = "red";
    });

    // 4. FUNÇÕES
    document.getElementById('up-img').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                img.scaleToWidth(200);
                fCanvas.add(img).centerObject(img);
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    window.savePreview = () => {
        fCanvas.discardActiveObject(); fCanvas.renderAll();
        setTimeout(() => {
            const a = document.createElement('a');
            a.download = 'Nostalgicas_Preview.png';
            a.href = renderer.domElement.toDataURL();
            a.click();
        }, 100);
    };

    document.getElementById('rot').oninput = (e) => {
        texture3d.offset.x = parseFloat(e.target.value);
    };

    document.getElementById('zoom').oninput = (e) => {
        camera.position.z = e.target.value;
    };

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    };
</script>
</body>
</html>
