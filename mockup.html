<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio - Fix Total</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #1a1a1a; overflow: hidden; }
        #render-3d { flex: 1; background: #fff; }
        #sidebar { width: 350px; background: #ffffff; border-left: 3px solid #3376e3; padding: 20px; box-shadow: -10px 0 20px rgba(0,0,0,0.2); z-index: 10; display: flex; flex-direction: column; overflow-y: auto; }
        .canvas-container { border: 2px solid #3376e3; margin: 15px 0; background: #fdfdfd; border-radius: 5px; }
        .btn { background: #3376e3; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .btn-limpar { background: #4a5568; margin-top: 10px; padding: 10px; color: white; border: none; width: 100%; border-radius: 5px; cursor: pointer; }
        .controles-manuais { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        label { font-size: 12px; font-weight: bold; display: block; margin-top: 10px; color: #333; }
        input[type="range"] { width: 100%; cursor: pointer; }
        h2 { color: #333; margin-top: 0; font-size: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>

<div id="render-3d"></div>

<aside id="sidebar">
    <h2>Nostálgicas Studio</h2>
    
    <input type="file" id="input-imagem" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('input-imagem').click()">📂 CARREGAR ARTE</button>

    <div class="canvas-container">
        <canvas id="editor-2d" width="310" height="140"></canvas>
    </div>

    <div class="controles-manuais">
        <label>Girar Estampa (Horizontal)</label>
        <input type="range" id="rotacao" min="0" max="6.28" step="0.01" value="3.14">
        
        <label>Altura (Vertical)</label>
        <input type="range" id="altura" min="-1" max="1" step="0.01" value="0">
        
        <label>Tamanho (Zoom)</label>
        <input type="range" id="zoom" min="0.5" max="1.5" step="0.01" value="1.0">
    </div>

    <button class="btn-limpar" onclick="limparAjustes()">✔️ FINALIZAR (Limpar bordas)</button>
</aside>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, caneca, estampa, fCanvas;

    // --- 1. EDITOR 2D ---
    fCanvas = new fabric.Canvas('editor-2d', { backgroundColor: '#ffffff' });
    
    window.limparAjustes = () => {
        fCanvas.discardActiveObject();
        fCanvas.requestRenderAll();
    };

    fCanvas.on('after:render', () => {
        if (!estampa) return;
        const texture = new THREE.CanvasTexture(fCanvas.getElement());
        texture.colorSpace = THREE.SRGBColorSpace;
        estampa.material.map = texture;
        estampa.material.needsUpdate = true;
    });

    // --- 2. AMBIENTE 3D ---
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 350) / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 0.5); // Posição fixa de segurança para enxergar objetos pequenos

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth - 350, window.innerHeight);
    document.getElementById('render-3d').appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 2));

    // --- 3. CARREGAR CANECA (FIX TOTAL) ---
    new OBJLoader().load('mug.obj', (obj) => {
        caneca = obj;

        // Centralização absoluta forçada
        const box = new THREE.Box3().setFromObject(caneca);
        const center = box.getCenter(new THREE.Vector3());
        caneca.position.sub(center); // Move o centro para (0,0,0)

        // Se a caneca sumiu, é porque a escala estava quebrada.
        // Se ela reaparecer branca mas sem a estampa, avise-me.
        // Se ela não aparecer, seu arquivo mug.obj está corrompido.
        caneca.traverse(c => {
            if (c.isMesh) c.material = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1 });
        });
        scene.add(caneca);

        // Criar Estampa (Protegendo a alça - Ângulo fixo em 4.5 radianos)
        const size = box.getSize(new THREE.Vector3());
        const raio = (size.x / 2) * 1.01;
        const altura = size.y * 0.85;
        // O valor 4.5 no final cria o corte para a alça. Se a arte ainda aparecer na alça, diminua para 4.0.
        const geo = new THREE.CylinderGeometry(raio, raio, altura, 64, 1, true, -2.25, 4.5);
        
        estampa = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ 
            transparent: true, 
            side: THREE.DoubleSide,
            polygonOffset: true, 
            polygonOffsetFactor: -1 
        }));
        
        estampa.rotation.y = Math.PI; // Ajusta para a frente da caneca
        scene.add(estampa);

        // Define a câmera para focar no tamanho da caneca
        camera.position.z = size.z * 3;
        controls.update();
    });

    // --- 4. UPLOAD DE IMAGEM ---
    document.getElementById('input-imagem').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            fabric.Image.fromURL(event.target.result, (img) => {
                img.scaleToWidth(140);
                fCanvas.add(img);
                fCanvas.centerObject(img);
                fCanvas.setActiveObject(img);
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // --- 5. CONTROLES MANUAIS (SLIDERS) ---
    document.getElementById('rotacao').addEventListener('input', (e) => {
        if (estampa) estampa.rotation.y = parseFloat(e.target.value);
    });

    document.getElementById('altura').addEventListener('input', (e) => {
        if (estampa) estampa.position.y = parseFloat(e.target.value);
    });

    document.getElementById('zoom').addEventListener('input', (e) => {
        if (estampa) {
            const s = parseFloat(e.target.value);
            estampa.scale.set(s, s, s);
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // Ajuste de tela
    window.addEventListener('resize', () => {
        camera.aspect = (window.innerWidth - 350) / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth - 350, window.innerHeight);
    });
</script>
</body>
</html>
