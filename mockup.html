<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio - VERSAO 10</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #000; overflow: hidden; }
        #sidebar { 
            width: 340px; min-width: 340px; background: #1a1a1a; color: white; 
            padding: 20px; border-right: 3px solid #2ecc71; z-index: 10; overflow-y: auto;
        }
        /* FUNDO EXTERIOR BRANCO PURO */
        #render-3d { flex: 1; background: #ffffff; cursor: move; }
        .canvas-container { background: white; border: 2px solid #333; margin-bottom: 10px; line-height: 0; }
        .btn { width: 100%; padding: 12px; margin-bottom: 8px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px; text-transform: uppercase; }
        .btn-img { background: #333; color: white; }
        .btn-save { background: #2ecc71; color: white; margin-top: 15px; }
        label { display: block; font-size: 10px; color: #888; margin: 10px 0 5px 0; text-transform: uppercase; }
        input[type="range"] { width: 100%; accent-color: #2ecc71; }
        .colors { display: flex; gap: 8px; }
        .c-btn { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #444; }
        .c-btn.active { border-color: #2ecc71; }
    </style>
</head>
<body>

<aside id="sidebar">
    <h2 style="color:#2ecc71; margin:0;">NOSTÁLGICAS</h2>
    <p style="font-size:9px; color:#666; margin-bottom:20px;">MOCKUP REALISTA V10</p>

    <label>1. ARTE (CLIQUE NA FOTO PARA AJUSTAR TAMANHO)</label>
    <div class="canvas-container">
        <canvas id="c2d" width="450" height="190" style="width:100%; height:auto;"></canvas>
    </div>

    <button class="btn btn-img" onclick="document.getElementById('up').click()">+ Inserir Foto</button>
    <button class="btn btn-img" onclick="addT()">+ Inserir Texto</button>
    <input type="file" id="up" style="display:none" accept="image/*">

    <label>2. COR DO INTERIOR / ALÇA</label>
    <div class="colors">
        <div class="c-btn active" style="background:#fff" onclick="chC(this,'#fff')"></div>
        <div class="c-btn" style="background:#000" onclick="chC(this,'#000')"></div>
        <div class="c-btn" style="background:#ffc0cb" onclick="chC(this,'#ffc0cb')"></div>
    </div>

    <label>3. GIRAR ARTE NA CANECA</label>
    <input type="range" id="rot" min="-0.5" max="0.5" step="0.001" value="0">

    <button class="btn btn-save" onclick="save()">BAIXAR FOTO MOCKUP</button>
</aside>

<div id="render-3d"></div>

<script>
    // --- EDITOR DE ARTE (FABRIC.JS) ---
    const fCanvas = new fabric.Canvas('c2d', { backgroundColor: '#fff' });
    
    // Configura os quadradinhos de redimensionar (VERDES)
    fabric.Object.prototype.set({
        cornerColor: '#2ecc71',
        cornerStyle: 'circle',
        cornerSize: 12,
        transparentCorners: false
    });

    fCanvas.on('after:render', () => { if(tex) tex.needsUpdate = true; });

    function addT() {
        const t = new fabric.IText('Texto Aqui', { left: 50, top: 50, fontSize: 25 });
        fCanvas.add(t).setActiveObject(t);
    }

    document.getElementById('up').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => fabric.Image.fromURL(f.target.result, (img) => {
            img.scaleToWidth(150);
            fCanvas.add(img).centerObject(img).setActiveObject(img);
        });
        reader.readAsDataURL(e.target.files[0]);
    };

    // --- MOTOR 3D (THREE.JS) ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff); // CHÃO BRANCO
    const container = document.getElementById('render-3d');
    const cam = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
    cam.position.set(0, 1.5, 7);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(cam, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 1.1));
    const light = new THREE.DirectionalLight(0xffffff, 0.5);
    light.position.set(5, 10, 7);
    scene.add(light);

    // --- A CANECA SÓLIDA ---
    const tex = new THREE.CanvasTexture(fCanvas.getElement());
    tex.wrapS = THREE.RepeatWrapping;
    const matExt = new THREE.MeshPhongMaterial({ map: tex, shininess: 80 });
    const matInt = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 80 });

    const mug = new THREE.Group();
    // Exterior
    const pE = []; for(let i=0; i<=10; i++) pE.push(new THREE.Vector2(1.1, (i-5)*0.25));
    mug.add(new THREE.Mesh(new THREE.LatheGeometry(pE, 64), matExt));
    // Interior
    const pI = []; for(let i=0; i<=10; i++) pI.push(new THREE.Vector2(1.05, (i-5)*0.24));
    const inner = new THREE.Mesh(new THREE.LatheGeometry(pI, 64), matInt);
    inner.rotation.x = Math.PI;
    mug.add(inner);
    // Topo e Fundo
    const ring = new THREE.Mesh(new THREE.RingGeometry(1.05, 1.1, 64), matInt);
    ring.rotation.x = -Math.PI/2; ring.position.y = 1.25;
    mug.add(ring);
    const bottom = new THREE.Mesh(new THREE.CircleGeometry(1.1, 64), matInt);
    bottom.rotation.x = -Math.PI/2; bottom.position.y = -1.25;
    mug.add(bottom);
    // Alça
    const handle = new THREE.Mesh(new THREE.TorusGeometry(0.75, 0.12, 12, 48, Math.PI), matInt);
    handle.position.set(1.1, 0, 0); handle.rotation.z = -Math.PI/2;
    mug.add(handle);

    scene.add(mug);

    // Sombra de contato
    const shadow = new THREE.Mesh(new THREE.CircleGeometry(1.2, 32), new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.1 }));
    shadow.rotation.x = -Math.PI/2; shadow.position.y = -1.26;
    scene.add(shadow);

    // --- FUNÇÕES ---
    window.chC = (btn, c) => {
        matInt.color.set(c);
        document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    };

    window.save = () => {
        fCanvas.discardActiveObject(); fCanvas.renderAll();
        setTimeout(() => {
            const a = document.createElement('a');
            a.download = 'Mockup_Nostalgicas.png';
            a.href = renderer.domElement.toDataURL();
            a.click();
        }, 150);
    };

    document.getElementById('rot').oninput = (e) => tex.offset.x = parseFloat(e.target.value);

    function anim() { requestAnimationFrame(anim); controls.update(); renderer.render(scene, cam); }
    anim();
</script>
</body>
</html>
