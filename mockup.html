<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio - Controle Total</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #1a1a1a; overflow: hidden; }
        #render-3d { flex: 1; background: #fff; }
        #sidebar { width: 350px; background: #ffffff; border-left: 3px solid #3376e3; padding: 20px; z-index: 10; display: flex; flex-direction: column; }
        .canvas-container { border: 2px solid #3376e3; margin: 15px 0; background: #fdfdfd; }
        .btn { background: #3376e3; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        label { font-size: 11px; font-weight: bold; display: block; margin-top: 10px; }
        input[type="range"] { width: 100%; }
    </style>
</head>
<body>

<div id="render-3d"></div>

<aside id="sidebar">
    <h2 style="margin:0; font-size: 1.2rem;">Nostálgicas Studio</h2>
    
    <input type="file" id="input-imagem" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('input-imagem').click()">📂 CARREGAR ARTE</button>

    <div class="canvas-container">
        <canvas id="editor-2d" width="310" height="140"></canvas>
    </div>

    <label>Girar Arte (Horizontal)</label>
    <input type="range" id="rotacao" min="0" max="6.28" step="0.01" value="3.14">
    
    <label>Altura (Vertical)</label>
    <input type="range" id="altura" min="-5" max="5" step="0.1" value="0">
    
    <label>Zoom da Estampa</label>
    <input type="range" id="zoom" min="0.1" max="3" step="0.1" value="1">

    <button style="margin-top:20px;" class="btn" onclick="fCanvas.discardActiveObject(); fCanvas.requestRenderAll();">✔️ LIMPAR BORDAS</button>
</aside>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, estampa, fCanvas;

    // 1. EDITOR 2D
    fCanvas = new fabric.Canvas('editor-2d', { backgroundColor: '#ffffff' });
    fCanvas.on('after:render', () => {
        if (!estampa) return;
        const texture = new THREE.CanvasTexture(fCanvas.getElement());
        texture.colorSpace = THREE.SRGBColorSpace;
        estampa.material.map = texture;
        estampa.material.needsUpdate = true;
    });

    // 2. AMBIENTE 3D
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 350) / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 15); // Câmera afastada para ver o objeto escalado

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth - 350, window.innerHeight);
    document.getElementById('render-3d').appendChild(renderer.domElement);
    controls = new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 2));

    // 3. CARREGAR CANECA
    new OBJLoader().load('mug.obj', (obj) => {
        obj.scale.set(100, 100, 100); // Força aumento de 100x
        const box = new THREE.Box3().setFromObject(obj);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        obj.position.sub(center);
        
        obj.traverse(c => {
            if (c.isMesh) c.material = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.2 });
        });
        scene.add(obj);

        // CRIAR ESTAMPA COM CORTE MANUAL NA ALÇA
        // Comprimento 3.5 = Aproximadamente meia caneca + laterais (foge da alça)
        const geo = new THREE.CylinderGeometry(size.x/2 * 1.02, size.x/2 * 1.02, size.y * 0.8, 64, 1, true, -2.0, 4);
        estampa = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ transparent: true, side: THREE.DoubleSide }));
        estampa.rotation.y = 3.14; 
        scene.add(estampa);
    });

    // 4. UPLOAD
    document.getElementById('input-imagem').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            fabric.Image.fromURL(ev.target.result, (img) => {
                img.scaleToWidth(150);
                fCanvas.add(img);
                fCanvas.centerObject(img);
                fCanvas.setActiveObject(img);
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // 5. SLIDERS
    document.getElementById('rotacao').oninput = (e) => { if(estampa) estampa.rotation.y = parseFloat(e.target.value); };
    document.getElementById('altura').oninput = (e) => { if(estampa) estampa.position.y = parseFloat(e.target.value); };
    document.getElementById('zoom').oninput = (e) => { if(estampa) { const s = parseFloat(e.target.value); estampa.scale.set(s,s,s); } };

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    animate();
</script>
</body>
</html>
