<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Nostálgicas - Premium</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #ffffff; overflow: hidden; }
        
        #admin-panel { 
            position: absolute; top: 15px; left: 15px; 
            background: white; padding: 20px; border-radius: 15px;
            z-index: 100; width: 300px; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        /* Área do Retângulo de Estampa */
        .guia-estampa {
            width: 100%; height: 120px; border: 2px dashed #ccc;
            margin: 15px 0; position: relative; overflow: hidden;
            background: #f9f9f9; display: flex; align-items: center; justify-content: center;
        }
        #preview-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        h3 { margin: 0 0 15px 0; color: #333; font-size: 18px; text-align: center; }
        label { display: block; margin-top: 10px; font-size: 12px; font-weight: bold; color: #555; }
        input[type="range"] { width: 100%; accent-color: #ff4081; }
        input[type="file"] { width: 100%; margin-top: 5px; cursor: pointer; }
        
        .instrucoes { font-size: 11px; color: #888; margin-top: 10px; text-align: center; }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
    </style>
</head>
<body>

<div id="admin-panel">
    <h3>Personalização</h3>
    
    <label>Arte da Caneca</label>
    <input type="file" id="upload" accept="image/*">

    <div class="guia-estampa">
        <img id="preview-img" src="" style="display:none;">
        <span id="placeholder-text" style="color:#aaa; font-size:10px;">PRÉVIA DA ARTE</span>
    </div>
    
    <label>Tamanho da Estampa (Zoom)</label>
    <input type="range" id="scale" min="0.5" max="4" step="0.01" value="1.5">
    
    <label>Posição Horizontal</label>
    <input type="range" id="offsetX" min="-1.5" max="1.5" step="0.01" value="0.5">
    
    <label>Posição Vertical</label>
    <input type="range" id="offsetY" min="-1.5" max="1.5" step="0.01" value="0">

    <div class="instrucoes">Gire a caneca com o mouse/dedo</div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, mugModel, texture;

    const uploadInput = document.getElementById('upload');
    const previewImg = document.getElementById('preview-img');
    const placeholder = document.getElementById('placeholder-text');

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        // CÂMERA MAIS PRÓXIMA
        camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.5, 3.5); // Reduzi de 5 para 3.5 para ficar perto

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);
        
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(2, 3, 4);
        scene.add(pointLight);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 2.5; // Impede que o cliente se afaste demais
        controls.maxDistance = 5;
        controls.target.set(0, 0, 0);

        const loader = new GLTFLoader();
        loader.load('caneca.glb', (gltf) => {
            mugModel = gltf.scene;
            
            // Centraliza o modelo corretamente
            const box = new THREE.Box3().setFromObject(mugModel);
            const center = box.getCenter(new THREE.Vector3());
            mugModel.position.set(-center.x, -center.y, -center.z);
            
            scene.add(mugModel);
            checkUrlParams();
        });

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function checkUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const fotoUrl = params.get('foto');
        if (fotoUrl) {
            applyTexture(fotoUrl);
            document.getElementById('admin-panel').style.display = 'none';
        }
    }

    function applyTexture(source) {
        const texLoader = new THREE.TextureLoader();
        texLoader.load(source, (tex) => {
            texture = tex;
            
            // CONFIGURAÇÃO PARA NÃO REPETIR E NÃO PEGAR DENTRO/EMBAIXO
            texture.wrapS = THREE.ClampToEdgeWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            
            // Ajuste fino para alinhar ao centro da face externa
            updateTextureMapping();

            mugModel.traverse((child) => {
                if (child.isMesh) {
                    child.material.map = texture;
                    child.material.needsUpdate = true;
                }
            });
            
            // Atualiza o preview no painel
            previewImg.src = source;
            previewImg.style.display = 'block';
            placeholder.style.display = 'none';
        });
    }

    function updateTextureMapping() {
        if (!texture) return;
        
        // Inverte a escala para o slider fazer sentido (maior valor = maior imagem)
        const s = 1 / parseFloat(document.getElementById('scale').value);
        texture.repeat.set(s, s);
        
        // Offset centralizado
        const ox = parseFloat(document.getElementById('offsetX').value);
        const oy = parseFloat(document.getElementById('offsetY').value);
        texture.offset.set(ox, oy);
    }

    uploadInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => applyTexture(event.target.result);
            reader.readAsDataURL(file);
        }
    });

    ['scale', 'offsetX', 'offsetY'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateTextureMapping);
    });

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
