<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Studio - Preview Realista</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --panel: #222; --accent: #ffffff; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #111; color: white; overflow: hidden; }
        #render-3d { flex: 1; background: #ffffff; }
        #sidebar { width: 380px; background: var(--panel); padding: 20px; border-left: 1px solid #444; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .canvas-area { background: #333; padding: 5px; border: 1px solid #555; margin-bottom: 20px; position: relative; }
        .dim-label { position: absolute; top: -20px; left: 0; font-size: 10px; color: #888; text-transform: uppercase; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: transparent; color: white; border: 1.5px solid white; padding: 12px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .btn:hover { background: white; color: black; }
        .btn-full { grid-column: span 2; background: #2f855a; border: none; margin-top: 10px; }
        .btn-full:hover { background: #38a169; color: white; }
        .controls { margin-top: 25px; border-top: 1px solid #444; padding-top: 20px; }
        label { font-size: 10px; color: #aaa; text-transform: uppercase; display: block; margin-bottom: 8px; }
        input[type="range"] { width: 100%; margin-bottom: 20px; accent-color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="render-3d"></div>

<aside id="sidebar">
    <div class="canvas-area">
        <span class="dim-label">Área de Impressão: 225 x 95 mm</span>
        <canvas id="canvas2d" width="340" height="143"></canvas>
    </div>

    <div class="button-grid">
        <input type="file" id="up-img" style="display:none" accept="image/*">
        <button class="btn" onclick="document.getElementById('up-img').click()"><i class="fa-regular fa-image"></i> IMAGEM</button>
        <button class="btn" onclick="addText()"><i class="fa-solid fa-font"></i> TEXTO</button>
        <button class="btn-full btn" onclick="takePhoto()"><i class="fa-solid fa-camera"></i> SALVAR FOTO PARA CLIENTE</button>
        <button class="btn" style="grid-column: span 2; margin-top:5px; border-color:#555; color:#888" onclick="location.reload()">REINICIAR</button>
    </div>

    <div class="controls">
        <label>Ajuste Lateral (Centralizar Arte)</label>
        <input type="range" id="rot" min="-0.5" max="0.5" step="0.001" value="0">
        
        <label>Zoom do Mockup</label>
        <input type="range" id="cam-z" min="3" max="10" step="0.1" value="6">
    </div>
</aside>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. FABRIC.JS - Configurado para 22.5 x 9.5
    const fCanvas = new fabric.Canvas('canvas2d', { backgroundColor: '#fff' });
    fCanvas.on('after:render', () => { if(texture3d) texture3d.needsUpdate = true; });

    // 2. THREE.JS SETUP
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const camera = new THREE.PerspectiveCamera(40, (window.innerWidth - 380) / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth - 380, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.getElementById('render-3d').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 1.8));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);

    // 3. TEXTURA E SHADER (BLOQUEIO DE INTERIOR)
    const texture3d = new THREE.CanvasTexture(fCanvas.getElement());
    texture3d.colorSpace = THREE.SRGBColorSpace;
    // ClampToEdge impede que a arte se repita no fundo ou interior
    texture3d.wrapS = texture3d.wrapT = THREE.ClampToEdgeWrapping;

    const shaderMaterial = new THREE.ShaderMaterial({
        uniforms: { 
            map: { value: texture3d }, 
            color: { value: new THREE.Color(0xffffff) } 
        },
        vertexShader: `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            uniform sampler2D map;
            uniform vec3 color;
            varying vec2 vUv;
            void main() {
                vec4 tex = texture2D(map, vUv);
                // gl_FrontFacing identifica a face externa da malha
                if (gl_FrontFacing) {
                    gl_FragColor = mix(vec4(color, 1.0), tex, tex.a);
                } else {
                    gl_FragColor = vec4(color, 1.0); // Interior sempre branco puro
                }
            }
        `,
        side: THREE.DoubleSide
    });

    // 4. CARREGAR MUG.OBJ DO GITHUB
    const loader = new OBJLoader();
    loader.load('mug.obj', (obj) => {
        const mesh = obj.children[0];
        obj.scale.set(50, 50, 50);
        
        // Centralização
        const box = new THREE.Box3().setFromObject(obj);
        const center = box.getCenter(new THREE.Vector3());
        obj.position.sub(center);

        // MAPEAMENTO UV PARA 22.5cm (Envolve a caneca quase toda)
        const geo = mesh.geometry;
        geo.computeBoundingBox();
        const uv = geo.attributes.uv;
        const pos = geo.attributes.position;
        
        for (let i = 0; i < pos.count; i++) {
            // A matemática abaixo projeta a arte exatamente na frente e laterais
            // O divisor 1.6 ajusta a largura para os 22.5cm sem encostar na alça
            let u = Math.atan2(pos.getX(i), pos.getZ(i)) / (Math.PI * 1.6) + 0.5;
            let v = (pos.getY(i) - geo.boundingBox.min.y) / (geo.boundingBox.max.y - geo.boundingBox.min.y);
            uv.setXY(i, u, v);
        }

        mesh.material = shaderMaterial;
        scene.add(obj);
    }, undefined, (err) => {
        console.error(err);
        alert("Certifique-side de que o arquivo 'mug.obj' está na raiz do seu GitHub!");
    });

    // 5. FUNÇÕES DE INTERFACE
    window.addText = () => {
        fCanvas.add(new fabric.IText('Nostálgicas', {
            left: 100, top: 50, fontSize: 30, fontFamily: 'Arial', fill: '#333'
        }));
    };

    document.getElementById('up-img').onchange = (e) => {
        const r = new FileReader();
        r.onload = (f) => fabric.Image.fromURL(f.target.result, (img) => {
            img.scaleToWidth(150); fCanvas.add(img).centerObject(img);
        });
        r.readAsDataURL(e.target.files[0]);
    };

    window.takePhoto = () => {
        fCanvas.discardActiveObject(); fCanvas.renderAll();
        setTimeout(() => {
            const a = document.createElement('a');
            a.download = 'Mockup_Nostalgicas.png';
            a.href = renderer.domElement.toDataURL();
            a.click();
        }, 100);
    };

    document.getElementById('rot').oninput = (e) => texture3d.offset.x = parseFloat(e.target.value);
    document.getElementById('cam-z').oninput = (e) => camera.position.z = e.target.value;

    function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
    animate();
</script>
</body>
</html>
