<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Studio - Oficial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --panel: #222; }
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #111; color: white; overflow: hidden; }
        #render-3d { flex: 1; background: #ffffff; cursor: move; }
        #sidebar { width: 350px; background: var(--panel); padding: 15px; border-left: 1px solid #444; display: flex; flex-direction: column; z-index: 10; }
        .canvas-area { background: #333; padding: 5px; border: 1px solid #555; margin-bottom: 15px; }
        .btn { background: #444; color: white; border: 1px solid #666; padding: 10px; cursor: pointer; width: 100%; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; font-size: 11px; transition: 0.2s; }
        .btn:hover { background: #555; border-color: #fff; }
        .btn-save { background: #28a745; border: none; margin-top: 10px; padding: 15px; }
        .btn-save:hover { background: #218838; }
        label { font-size: 10px; color: #888; display: block; margin: 10px 0 5px; }
        input[type="range"] { width: 100%; accent-color: #28a745; }
    </style>
</head>
<body>

<div id="render-3d"></div>

<aside id="sidebar">
    <div style="font-weight: bold; color: #28a745; margin-bottom: 10px;">NOSTÁLGICAS STUDIO</div>
    <div class="canvas-area">
        <canvas id="canvas2d" width="300" height="126"></canvas>
    </div>

    <input type="file" id="up-img" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('up-img').click()"><i class="fa-regular fa-image"></i> ADICIONAR IMAGEM</button>
    <button class="btn" onclick="addText()"><i class="fa-solid fa-font"></i> ADICIONAR TEXTO</button>
    
    <button class="btn btn-save" onclick="takePhoto()"><i class="fa-solid fa-camera"></i> SALVAR FOTO PARA CLIENTE</button>

    <label>GIRAR ESTAMPA</label>
    <input type="range" id="rot" min="-0.5" max="0.5" step="0.001" value="0">
    
    <label>ZOOM</label>
    <input type="range" id="cam-z" min="3" max="10" step="0.1" value="6">
</aside>

<script>
    // --- 1. CONFIGURAÇÃO DO EDITOR 2D (FABRIC) ---
    const fCanvas = new fabric.Canvas('canvas2d', { backgroundColor: '#fff' });
    
    // Atualiza o 3D sempre que algo mudar no editor
    fCanvas.on('after:render', () => { 
        if(texture3d) texture3d.needsUpdate = true; 
    });

    // --- 2. CONFIGURAÇÃO DO AMBIENTE 3D (THREE.JS) ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const container = document.getElementById('render-3d');
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    // Luzes
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const light = new THREE.DirectionalLight(0xffffff, 0.8);
    light.position.set(5, 5, 5);
    scene.add(light);

    // Controles de mouse
    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    // --- 3. CRIAÇÃO DA CANECA (GEOMETRIA NATIVA) ---
    const texture3d = new THREE.CanvasTexture(fCanvas.getElement());
    texture3d.colorSpace = THREE.SRGBColorSpace;

    // Material da parte de fora (com a arte)
    const matOut = new THREE.MeshPhongMaterial({
        color: 0xffffff,
        map: texture3d,
        shininess: 60
    });

    // Material da parte de dentro e alça (branco liso)
    const matPlain = new THREE.MeshPhongMaterial({ color: 0xffffff });

    // Grupo que contém todas as partes da caneca
    const mugGroup = new THREE.Group();

    // Cilindro Externo (Corpo) - Proporção ajustada para 22.5x9.5
    const geoOut = new THREE.CylinderGeometry(1, 1, 2.2, 64, 1, true);
    const bodyOut = new THREE.Mesh(geoOut, matOut);
    mugGroup.add(bodyOut);

    // Cilindro Interno
    const geoIn = new THREE.CylinderGeometry(0.95, 0.95, 2.15, 64, 1, true);
    const bodyIn = new THREE.Mesh(geoIn, matPlain);
    bodyIn.rotation.x = Math.PI; 
    mugGroup.add(bodyIn);

    // Fundo
    const geoBottom = new THREE.CircleGeometry(1, 64);
    const bottom = new THREE.Mesh(geoBottom, matPlain);
    bottom.rotation.x = -Math.PI / 2;
    bottom.position.y = -1.1;
    mugGroup.add(bottom);

    // Alça
    const geoHandle = new THREE.TorusGeometry(0.6, 0.12, 16, 32, Math.PI);
    const handle = new THREE.Mesh(geoHandle, matPlain);
    handle.position.set(1.0, 0, 0);
    handle.rotation.z = -Math.PI / 2;
    mugGroup.add(handle);

    scene.add(mugGroup);

    // --- 4. FUNÇÕES DE INTERAÇÃO ---
    window.addText = () => {
        fCanvas.add(new fabric.IText('Nostálgicas', {
            left: 50, top: 50, fontSize: 25, fontFamily: 'Arial'
        }));
    };

    document.getElementById('up-img').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                img.scaleToWidth(150);
                fCanvas.add(img).centerObject(img);
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    window.takePhoto = () => {
        fCanvas.discardActiveObject(); fCanvas.renderAll();
        setTimeout(() => {
            const link = document.createElement('a');
            link.download = 'Mockup_Nostalgicas.png';
            link.href = renderer.domElement.toDataURL();
            link.click();
        }, 100);
    };

    // Sliders
    document.getElementById('rot').oninput = (e) => {
        texture3d.offset.x = parseFloat(e.target.value);
    };
    document.getElementById('cam-z').oninput = (e) => {
        camera.position.z = e.target.value;
    };

    // Loop de Animação
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // Ajuste de Janela
    window.onresize = () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    };
</script>
</body>
</html>
