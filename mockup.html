<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nostálgicas - Mockup Pro</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #ffffff; overflow: hidden; touch-action: none; }
        
        /* Ajuste para Celular e PC */
        #controls { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; background: rgba(255,255,255,0.9);
            padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100; display: flex; flex-direction: column; gap: 10px;
            backdrop-filter: blur(5px); border: 1px solid #eee;
        }

        .slider-group { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: bold; color: #666; margin-bottom: 2px; text-transform: uppercase; }
        input[type="range"] { width: 100%; accent-color: #ff4081; cursor: pointer; }
        
        .btn-upload { 
            background: #ff4081; color: white; border: none; padding: 12px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px;
        }

        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="controls">
    <input type="file" id="fileInput" style="display:none" accept="image/*">
    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">ESCOLHER ESTAMPA</button>
    
    <div class="slider-group">
        <label>Tamanho da Arte</label>
        <input type="range" id="uScale" min="0.5" max="5" step="0.01" value="1.5">
    </div>
    <div class="slider-group">
        <label>Posição Lateral (Girar)</label>
        <input type="range" id="uOffsetX" min="-2" max="2" step="0.01" value="0.5">
    </div>
    <div class="slider-group">
        <label>Altura</label>
        <input type="range" id="uOffsetY" min="-2" max="2" step="0.01" value="0.2">
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, mug, texture;

    // Seletores
    const scaleIn = document.getElementById('uScale');
    const xIn = document.getElementById('uOffsetX');
    const yIn = document.getElementById('uOffsetY');

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        // Câmera com FOV menor para dar efeito de "zoom de produto"
        camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Luzes mais fortes para cerâmica branca
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const loader = new GLTFLoader();
        loader.load('caneca.glb', (gltf) => {
            mug = gltf.scene;
            
            // Centralização e Zoom Automático
            const box = new THREE.Box3().setFromObject(mug);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            mug.position.x += (mug.position.x - center.x);
            mug.position.y += (mug.position.y - center.y);
            mug.position.z += (mug.position.z - center.z);
            
            // Aproxima a câmera baseado no tamanho real da caneca
            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.set(0, size.y / 2, maxDim * 3.5); // 3.5 é o fator de proximidade
            controls.target.set(0, size.y / 2, 0);

            scene.add(mug);
            
            // Verifica se tem link pronto do cliente
            checkUrl();
        });

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function applyTexture(file) {
        new THREE.TextureLoader().load(file, (tex) => {
            texture = tex;
            // ESSENCIAL: Faz a arte NÃO repetir (não vaza para dentro)
            texture.wrapS = texture.wrapT = THREE.ClampToEdgeWrapping;
            
            mug.traverse(child => {
                if(child.isMesh) {
                    child.material.map = texture;
                    child.material.needsUpdate = true;
                }
            });
            updateTex();
        });
    }

    function updateTex() {
        if(!texture) return;
        const s = 1 / parseFloat(scaleIn.value);
        texture.repeat.set(s, s);
        texture.offset.set(parseFloat(xIn.value), parseFloat(yIn.value));
    }

    // Eventos
    document.getElementById('fileInput').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => applyTexture(ev.target.result);
        reader.readAsDataURL(e.target.files[0]);
    });

    [scaleIn, xIn, yIn].forEach(el => el.addEventListener('input', updateTex));

    function checkUrl() {
        const p = new URLSearchParams(window.location.search);
        if(p.get('foto')) {
            applyTexture(p.get('foto'));
            document.getElementById('controls').style.display = 'none';
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
