<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas - Mockup de Precisão</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f4f4; overflow: hidden; }
        
        /* Painel Administrativo */
        #admin-panel { 
            position: absolute; top: 10px; left: 10px; width: 320px;
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 100;
        }

        /* O RETÂNGULO DE ÁREA REAL (22.5 x 9.5) */
        .area-estampa-container {
            width: 100%; height: 120px; border: 2px solid #333;
            margin: 10px 0; position: relative; overflow: hidden;
            background: #eee; display: flex; align-items: center; justify-content: center;
        }
        #preview-foto {
            position: absolute; cursor: move;
            transform-origin: center;
        }

        h3 { margin: 0; font-size: 14px; color: #ff4081; text-transform: uppercase; }
        .instrucao { font-size: 11px; color: #777; margin-bottom: 10px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-top: 10px; }
        input[type="range"] { width: 100%; accent-color: #ff4081; }
        
        .btn-link { 
            background: #333; color: white; border: none; width: 100%; 
            padding: 8px; border-radius: 5px; margin-top: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="admin-panel">
    <h3>Área de Impressão (22.5x9.5cm)</h3>
    <p class="instrucao">Ajuste a foto dentro do retângulo abaixo:</p>
    
    <input type="file" id="upload" accept="image/*">

    <div class="area-estampa-container" id="mask">
        <img id="preview-foto" src="" style="display:none">
        <span id="txt-help">Carregue uma imagem</span>
    </div>

    <label>Tamanho da Imagem</label>
    <input type="range" id="scale" min="0.1" max="3" step="0.01" value="1">
    
    <label>Posição Horizontal</label>
    <input type="range" id="posX" min="-100" max="100" step="1" value="0">
    
    <label>Posição Vertical</label>
    <input type="range" id="posY" min="-100" max="100" step="1" value="0">

    <button class="btn-link" onclick="gerarLink()">Copiar Link do Cliente</button>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, mug, decal, texture;
    
    const imgEl = document.getElementById('preview-foto');
    const scaleIn = document.getElementById('scale');
    const posXIn = document.getElementById('posX');
    const posYIn = document.getElementById('posY');

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 4);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 0.5);
        sun.position.set(5, 5, 5);
        scene.add(sun);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const loader = new GLTFLoader();
        loader.load('caneca.glb', (gltf) => {
            mug = gltf.scene;
            
            // Centraliza o modelo
            const box = new THREE.Box3().setFromObject(mug);
            const center = box.getCenter(new THREE.Vector3());
            mug.position.sub(center);
            scene.add(mug);

            // CRIA O PLANO DE ESTAMPA (Decalque Curvado)
            // Um cilindro aberto que cobre apenas a frente (22.5cm proporcional)
            const geo = new THREE.CylinderGeometry(1.03, 1.03, 2.1, 64, 1, true, -Math.PI/1.5, Math.PI*1.3);
            const mat = new THREE.MeshStandardMaterial({ 
                transparent: true, 
                side: THREE.DoubleSide,
                polygonOffset: true,
                polygonOffsetFactor: -4
            });
            decal = new THREE.Mesh(geo, mat);
            scene.add(decal);

            checkUrl();
        });

        animate();
    }

    function applyTexture(src) {
        new THREE.TextureLoader().load(src, (tex) => {
            texture = tex;
            texture.wrapS = texture.wrapT = THREE.ClampToEdgeWrapping;
            decal.material.map = texture;
            decal.material.needsUpdate = true;
            
            imgEl.src = src;
            imgEl.style.display = 'block';
            document.getElementById('txt-help').style.display = 'none';
            update();
        });
    }

    function update() {
        if(!texture) return;
        
        // Atualiza o Retângulo de Preview (CSS)
        const s = scaleIn.value;
        const x = posXIn.value;
        const y = posYIn.value;
        imgEl.style.transform = `scale(${s}) translate(${x}px, ${y}px)`;

        // Atualiza a Caneca 3D (Three.js)
        texture.repeat.set(1/s, 1/s);
        // Normaliza o offset para o Three.js (0 a 1)
        texture.offset.set(0.5 - (x/200) - (0.5/s), 0.5 - (y/200) - (0.5/s));
    }

    document.getElementById('upload').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => applyTexture(ev.target.result);
        reader.readAsDataURL(e.target.files[0]);
    });

    [scaleIn, posXIn, posYIn].forEach(el => el.addEventListener('input', update));

    function checkUrl() {
        const p = new URLSearchParams(window.location.search);
        if(p.get('foto')) {
            applyTexture(p.get('foto'));
            document.getElementById('admin-panel').style.display = 'none';
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
