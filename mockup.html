<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostálgicas Studio - Mockup 325ml</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #111; overflow: hidden; }
        #render-3d { flex: 1; background: radial-gradient(#ffffff, #d7d7d7); }
        #sidebar { width: 350px; background: #1a1a1a; padding: 25px; color: white; border-left: 2px solid #2ecc71; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .canvas-container { background: white; border: 2px solid #444; margin-bottom: 20px; line-height: 0; }
        .btn { width: 100%; padding: 15px; margin-bottom: 10px; cursor: pointer; font-weight: bold; border: none; text-transform: uppercase; border-radius: 5px; transition: 0.3s; }
        .btn-img { background: #333; color: white; border: 1px solid #555; }
        .btn-img:hover { background: #444; }
        .btn-save { background: #2ecc71; color: white; margin-top: 10px; font-size: 16px; }
        .btn-save:hover { background: #27ae60; transform: scale(1.02); }
        label { font-size: 11px; color: #888; display: block; margin-top: 15px; text-transform: uppercase; }
        input[type="range"] { width: 100%; accent-color: #2ecc71; margin-top: 5px; }
        h2 { color: #2ecc71; margin-top: 0; font-size: 22px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="render-3d"></div>

<aside id="sidebar">
    <h2>NOSTÁLGICAS STUDIO</h2>
    <p style="font-size: 12px; color: #aaa; margin-bottom: 20px;">Área de Sublimação: 22,5 x 9,5 cm</p>
    
    <div class="canvas-container">
        <canvas id="canvas2d" width="450" height="190" style="width: 100%; height: auto;"></canvas>
    </div>

    <input type="file" id="up-img" style="display:none" accept="image/*">
    <button class="btn btn-img" onclick="document.getElementById('up-img').click()">+ Inserir Arte / Foto</button>
    <button class="btn btn-save" onclick="savePreview()">GERAR FOTO PARA CLIENTE</button>

    <label>Girar Arte na Caneca</label>
    <input type="range" id="rot" min="-0.5" max="0.5" step="0.001" value="0">
    
    <label>Zoom (Afastar/Aproximar)</label>
    <input type="range" id="zoom" min="4" max="10" step="0.1" value="6.5">
</aside>

<script>
    // 1. EDITOR 2D (FABRIC.JS)
    const fCanvas = new fabric.Canvas('canvas2d', { backgroundColor: '#ffffff' });
    fCanvas.on('after:render', () => { if(texture) texture.needsUpdate = true; });

    // 2. SETUP 3D (THREE.JS)
    const scene = new THREE.Scene();
    const container = document.getElementById('render-3d');
    const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 1, 6.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Luzes de Estúdio
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const light = new THREE.DirectionalLight(0xffffff, 0.5);
    light.position.set(5, 10, 7);
    scene.add(light);

    // 3. CRIAÇÃO DA CANECA VIA CÓDIGO (LATHE GEOMETRY)
    const texture = new THREE.CanvasTexture(fCanvas.getElement());
    texture.wrapS = THREE.RepeatWrapping;

    // Curvatura perfeita de uma caneca de 325ml
    const points = [];
    for ( let i = 0; i <= 20; i ++ ) {
        points.push( new THREE.Vector2( 1.1, ( i - 10 ) * 0.12 ) );
    }
    const geometry = new THREE.LatheGeometry( points, 64 );
    const material = new THREE.MeshPhongMaterial({ 
        map: texture, 
        color: 0xffffff, 
        shininess: 100,
        side: THREE.DoubleSide 
    });

    const mugBody = new THREE.Mesh( geometry, material );
    scene.add( mugBody );

    // Fundo da caneca
    const bottomGeo = new THREE.CircleGeometry(1.1, 64);
    const bottom = new THREE.Mesh(bottomGeo, new THREE.MeshPhongMaterial({color: 0xffffff}));
    bottom.rotation.x = -Math.PI / 2;
    bottom.position.y = -1.2;
    scene.add(bottom);

    // Alça (Torus)
    const handleGeo = new THREE.TorusGeometry(0.7, 0.13, 16, 100, Math.PI);
    const handle = new THREE.Mesh(handleGeo, new THREE.MeshPhongMaterial({color: 0xffffff}));
    handle.position.set(1.1, 0, 0);
    handle.rotation.z = -Math.PI / 2;
    scene.add(handle);

    // 4. FUNÇÕES
    document.getElementById('up-img').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                img.scaleToWidth(200);
                fCanvas.add(img).centerObject(img);
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    window.savePreview = () => {
        fCanvas.discardActiveObject(); fCanvas.renderAll();
        setTimeout(() => {
            const link = document.createElement('a');
            link.download = 'Mockup_Nostalgicas_3D.png';
            link.href = renderer.domElement.toDataURL('image/png');
            link.click();
        }, 150);
    };

    document.getElementById('rot').oninput = (e) => texture.offset.x = parseFloat(e.target.value);
    document.getElementById('zoom').oninput = (e) => camera.position.z = e.target.value;

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    };
</script>
</body>
</html>
