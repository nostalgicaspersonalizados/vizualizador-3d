<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas Studio - Interativo v11</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root { --accent: #2ecc71; }
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #000; overflow: hidden; }
        
        /* Menu lateral que some se o link for para o cliente */
        #sidebar { 
            width: 340px; min-width: 340px; background: #1a1a1a; color: white; 
            padding: 20px; border-right: 3px solid var(--accent); z-index: 10; overflow-y: auto;
        }
        body.client-mode #sidebar { display: none; } /* Esconde o menu para o cliente */

        #render-3d { flex: 1; background: #ffffff; cursor: move; position: relative; }
        .canvas-container { background: white; border: 2px solid #333; margin-bottom: 10px; }
        .btn { width: 100%; padding: 12px; margin-bottom: 8px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px; text-transform: uppercase; }
        .btn-img { background: #333; color: white; }
        .btn-share { background: #3498db; color: white; margin-top: 10px; }
        .btn-save { background: var(--accent); color: white; }
        label { display: block; font-size: 10px; color: #888; margin: 10px 0 5px 0; }
    </style>
</head>
<body>

<aside id="sidebar">
    <h2 style="color:var(--accent); margin:0;">NOSTÁLGICAS</h2>
    <p style="font-size:9px; color:#666; margin-bottom:20px;">EDITOR DE VENDAS</p>

    <label>1. DESENHO DA ESTAMPA</label>
    <div class="canvas-container">
        <canvas id="c2d" width="450" height="190" style="width:100%; height:auto;"></canvas>
    </div>

    <button class="btn btn-img" onclick="document.getElementById('up').click()">+ Foto</button>
    <button class="btn btn-img" onclick="addT()">+ Texto</button>
    <input type="file" id="up" style="display:none" accept="image/*">

    <label>2. COMPARTILHAR COM CLIENTE</label>
    <button class="btn btn-share" onclick="gerarLink()">GERAR LINK INTERATIVO</button>
    <p id="status" style="font-size:10px; color:var(--accent); text-align:center;"></p>

    <button class="btn btn-save" style="margin-top:20px;" onclick="save()">Baixar Foto</button>
</aside>

<div id="render-3d">
    <div id="msg-cliente" style="display:none; position:absolute; top:20px; left:20px; background:rgba(0,0,0,0.7); color:white; padding:10px; border-radius:20px; font-size:12px;">
        Gire a caneca com o dedo para ver os detalhes ↺
    </div>
</div>

<script>
    const fCanvas = new fabric.Canvas('c2d', { backgroundColor: '#fff' });
    fabric.Object.prototype.set({ cornerColor: '#2ecc71', cornerSize: 12, transparentCorners: false });

    fCanvas.on('after:render', () => { if(tex) tex.needsUpdate = true; });

    function addT() {
        const t = new fabric.IText('Texto Aqui', { left: 50, top: 50, fontSize: 25 });
        fCanvas.add(t).setActiveObject(t);
    }

    document.getElementById('up').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => fabric.Image.fromURL(f.target.result, (img) => {
            img.scaleToWidth(150); fCanvas.add(img).centerObject(img).setActiveObject(img);
        });
        reader.readAsDataURL(e.target.files[0]);
    };

    // --- LÓGICA DO LINK INTERATIVO ---
    function gerarLink() {
        fCanvas.discardActiveObject().renderAll();
        const artData = fCanvas.toDataURL({ format: 'png', quality: 0.5 });
        const compressed = btoa(artData); // Converte em código de texto
        const shareURL = window.location.origin + window.location.pathname + "?art=" + encodeURIComponent(compressed);
        
        navigator.clipboard.writeText(shareURL);
        document.getElementById('status').innerText = "LINK COPIADO! Cole no WhatsApp.";
    }

    // Verifica se é o cliente abrindo o link
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('art')) {
        document.body.classList.add('client-mode');
        document.getElementById('msg-cliente').style.display = 'block';
        const rawArt = atob(decodeURIComponent(urlParams.get('art')));
        fabric.Image.fromURL(rawArt, (img) => {
            fCanvas.clear();
            fCanvas.setBackgroundColor('#fff');
            fCanvas.add(img);
            fCanvas.renderAll();
        });
    }

    // --- MOTOR 3D (IGUAL AO ANTERIOR) ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const container = document.getElementById('render-3d');
    const cam = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
    cam.position.set(0, 1.5, 7);
    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);
    const controls = new THREE.OrbitControls(cam, renderer.domElement);
    controls.enableDamping = true;
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));

    const tex = new THREE.CanvasTexture(fCanvas.getElement());
    const matExt = new THREE.MeshPhongMaterial({ map: tex });
    const matInt = new THREE.MeshPhongMaterial({ color: 0xffffff });
    const mug = new THREE.Group();
    const pE = []; for(let i=0; i<=10; i++) pE.push(new THREE.Vector2(1.1, (i-5)*0.25));
    mug.add(new THREE.Mesh(new THREE.LatheGeometry(pE, 64), matExt));
    const pI = []; for(let i=0; i<=10; i++) pI.push(new THREE.Vector2(1.05, (i-5)*0.24));
    const inner = new THREE.Mesh(new THREE.LatheGeometry(pI, 64), matInt);
    inner.rotation.x = Math.PI; mug.add(inner);
    const bottom = new THREE.Mesh(new THREE.CircleGeometry(1.1, 64), matInt);
    bottom.rotation.x = -Math.PI/2; bottom.position.y = -1.25; mug.add(bottom);
    const handle = new THREE.Mesh(new THREE.TorusGeometry(0.75, 0.12, 12, 48, Math.PI), matInt);
    handle.position.set(1.1, 0, 0); handle.rotation.z = -Math.PI/2; mug.add(handle);
    scene.add(mug);

    function anim() { requestAnimationFrame(anim); controls.update(); renderer.render(scene, cam); }
    anim();

    function save() {
        fCanvas.discardActiveObject().renderAll();
        const a = document.createElement('a');
        a.download = 'Nostalgicas.png'; a.href = renderer.domElement.toDataURL(); a.click();
    }
</script>
</body>
</html>
