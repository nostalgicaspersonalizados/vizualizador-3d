<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostálgicas - Simples e Funcional</title>
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #f0f0f0; }
        #canvas-3d { flex: 1; background: #fff; }
        #menu { width: 340px; background: #fff; border-left: 2px solid #3376e3; padding: 20px; box-shadow: -2px 0 10px rgba(0,0,0,0.1); }
        .editor-2d { border: 2px solid #3376e3; margin: 15px 0; background: #fff; }
        .btn { background: #3376e3; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-limpar { background: #666; margin-top: 10px; padding: 10px; }
    </style>
</head>
<body>

<div id="canvas-3d"></div>

<aside id="menu">
    <h3 style="margin:0">Layout Simples</h3>
    
    <input type="file" id="arquivo" style="display:none" accept="image/*">
    <button class="btn" onclick="document.getElementById('arquivo').click()">1. SUBIR IMAGEM</button>

    <div class="editor-2d">
        <canvas id="c2d" width="300" height="130"></canvas>
    </div>

    <button class="btn btn-limpar" onclick="finalizar()">2. FINALIZAR (Sumiu Pontos)</button>
</aside>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, decal, fCanvas;

    // --- EDITOR 2D ---
    fCanvas = new fabric.Canvas('c2d', { backgroundColor: '#ffffff' });
    fabric.Object.prototype.set({
        transparentCorners: false,
        cornerColor: '#3376e3',
        cornerSize: 8,
        lockUniScaling: false
    });

    window.finalizar = () => {
        fCanvas.discardActiveObject();
        fCanvas.requestRenderAll();
    };

    fCanvas.on('after:render', () => {
        if (!decal) return;
        const texture = new THREE.CanvasTexture(fCanvas.getElement());
        texture.colorSpace = THREE.SRGBColorSpace;
        decal.material.map = texture;
        decal.material.needsUpdate = true;
    });

    // --- MUNDO 3D ---
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 340) / window.innerHeight, 0.01, 100);
    camera.position.set(0, 0, 0.5); // Posição fixa de segurança

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth - 340, window.innerHeight);
    document.getElementById('canvas-3d').appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 2));

    // --- CARREGAR OBJ ---
    new OBJLoader().load('mug.obj', (obj) => {
        // Centralização forçada
        const box = new THREE.Box3().setFromObject(obj);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        obj.position.sub(center);

        obj.traverse(c => {
            if (c.isMesh) c.material = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1 });
        });
        scene.add(obj);

        // Criar Estampa (Corte na alça fixo em 4.5 radianos)
        const geo = new THREE.CylinderGeometry(size.x/2 * 1.01, size.x/2 * 1.01, size.y * 0.85, 64, 1, true, -2.25, 4.5);
        decal = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ transparent: true, side: THREE.DoubleSide, polygonOffset: true, polygonOffsetFactor: -1 }));
        decal.rotation.y = Math.PI;
        scene.add(decal);
        
        // Ajusta zoom
        camera.position.z = size.z * 3;
    });

    // --- LOGICA DE IMAGEM ---
    document.getElementById('arquivo').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            fabric.Image.fromURL(f.target.result, (img) => {
                img.scaleToHeight(120);
                fCanvas.add(img);
                fCanvas.setActiveObject(img);
                fCanvas.centerObject(img);
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
